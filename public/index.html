function renderCurrentPage() {
  const page = state.pages[state.currentIndex];
  const canvas = $('canvasArea');
  if (!page) {
    canvas.className = 'canvas-area empty';
    canvas.innerHTML = EMPTY_STATE_HTML;
    return;
  }
  // Lazy-load any persisted drill descendants so previously-created drill
  // targets are visible even after a session restore or gallery reload.
  if (page.type === 'image') ensureDescendantsLoaded(page.id);

  // Phase A.3: when an image hasn't been classified yet, poll once after a
  // short delay to pick up the result of the background classify pass that
  // runs on every upload/generation. Cheap and bounded.
  if (page.type === 'image' && !page.classified) ensureClassifiedRefreshed(page.id);

  canvas.className = 'canvas-area';
  canvas.innerHTML = '';

  if (page.type === 'markdown') {
    const article = document.createElement('article');
    article.className = 'text-page';
    article.innerHTML = `
      <div class="text-page-header">
        <div class="text-page-title">${escapeHtml(page.title || 'Drill-down explanation')}</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          <div class="text-page-kind">Text response</div>
          ${rendererActions(page)}
        </div>
      </div>
      <div class="text-page-content">${simpleMarkdown(page.content || '')}</div>
      ${page.source ? `<div class="text-page-source">Generated via ${escapeHtml(page.source)}</div>` : ''}
    `;
    canvas.appendChild(article);
    bindRendererActions(page);
    renderMath(article);
    return;
  }

  if (page.type === 'chart') {
    const article = document.createElement('article');
    article.className = 'chart-page';
    const chart = page.chart || {};
    const chartability = chart.chartability || 'medium';
    const confidence = Number.isFinite(Number(chart.confidence)) ? `${Math.round(Number(chart.confidence) * 100)}% confidence` : 'confidence not rated';
    const reliabilityClass = chartability === 'low' ? 'bad' : (chart.requiresUserConfirmation || chart.validationIssues?.length ? 'warn' : '');
    const reliability = `
      <div class="chart-reliability">
        <span class="chart-pill ${reliabilityClass}">Chartability: ${escapeHtml(chartability)}</span>
        <span class="chart-pill ${reliabilityClass}">${escapeHtml(confidence)}</span>
        ${chart.requiresUserConfirmation ? '<span class="chart-pill warn">Review values before using</span>' : ''}
      </div>
    `;
    const fallback = chartability === 'low'
      ? `<div class="chart-fallback">A chart is not reliable for this selected region. Recommended fallback: ${escapeHtml(chart.fallbackRecommendation || 'text')}.</div>`
      : '';
    const notes = page.chart?.notes?.length
      ? `<ul class="chart-notes">${page.chart.notes.map(note => `<li>${escapeHtml(note)}</li>`).join('')}</ul>`
      : '';
    const evidenceItems = [
      ...(Array.isArray(chart.sourceEvidence) ? chart.sourceEvidence : []),
      ...(Array.isArray(chart.points) ? chart.points.filter(point => point.evidence).slice(0, 8).map(point => `${point.label}: ${point.evidence}`) : []),
    ].slice(0, 10);
    const evidence = evidenceItems.length
      ? `<ul class="chart-evidence">${evidenceItems.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`
      : '';
    const validation = chart.validationIssues?.length
      ? `<div class="chart-uncertainty">Validation notes: ${escapeHtml(chart.validationIssues.join(' '))}</div>`
      : '';
    const uncertainty = page.chart?.uncertainty
      ? `<div class="chart-uncertainty">${escapeHtml(page.chart.uncertainty)}</div>`
      : '';
    const shouldRenderChart = chartability !== 'low' && Array.isArray(chart.points) && chart.points.length >= 2;
    article.innerHTML = `
      <div class="text-page-header">
        <div class="text-page-title">${escapeHtml(page.title || page.chart?.title || 'Chart drill-down')}</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          <div class="text-page-kind">Chart response</div>
          ${rendererActions(page)}
        </div>
      </div>
      ${reliability}
      ${fallback}
      ${shouldRenderChart ? chartSvg(chart) : ''}
      ${notes}
      ${evidence}
      ${uncertainty}
      ${validation}
      ${page.source ? `<div class="text-page-source">Generated via ${escapeHtml(page.source)}</div>` : ''}
    `;
    canvas.appendChild(article);
    bindRendererActions(page);
    return;
  }

  if (page.type === 'table') {
    const article = document.createElement('article');
    article.className = 'chart-page';
    const notes = page.table?.notes?.length
      ? `<ul class="chart-notes">${page.table.notes.map(note => `<li>${escapeHtml(note)}</li>`).join('')}</ul>`
      : '';
    const uncertainty = page.table?.uncertainty
      ? `<div class="chart-uncertainty">${escapeHtml(page.table.uncertainty)}</div>`
      : '';
    article.innerHTML = `
      <div class="text-page-header">
        <div class="text-page-title">${escapeHtml(page.title || page.table?.title || 'Table drill-down')}</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          <div class="text-page-kind">Table response</div>
          ${rendererActions(page)}
        </div>
      </div>
      ${tableHtml(page.table || {})}
      ${notes}
      ${uncertainty}
      ${page.source ? `<div class="text-page-source">Generated via ${escapeHtml(page.source)}</div>` : ''}
    `;
    canvas.appendChild(article);
    bindRendererActions(page);
    renderMath(article);
    return;
  }

  if (page.type === 'diagram') {
    const article = document.createElement('article');
    article.className = 'chart-page diagram-page';
    const notes = page.diagram?.notes?.length
      ? `<ul class="diagram-notes">${page.diagram.notes.map(note => `<li>${escapeHtml(note)}</li>`).join('')}</ul>`
      : '';
    const uncertainty = page.diagram?.uncertainty
      ? `<div class="chart-uncertainty">${escapeHtml(page.diagram.uncertainty)}</div>`
      : '';
    article.innerHTML = `
      <div class="text-page-header">
        <div class="text-page-title">${escapeHtml(page.title || page.diagram?.title || 'Diagram drill-down')}</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          <div class="text-page-kind">Diagram response</div>
          ${rendererActions(page)}
        </div>
      </div>
      ${diagramSvg(page.diagram || {})}
      ${notes}
      ${uncertainty}
      ${page.source ? `<div class="text-page-source">Generated via ${escapeHtml(page.source)}</div>` : ''}
    `;
    canvas.appendChild(article);
    bindRendererActions(page);
    renderMath(article);
    return;
  }

  const container = document.createElement('div');
  container.className = `image-container${state.drillMode ? ' clickable' : ''}`;
  loadSourceContext(page.id);
  loadInlineAnalysis(page.id);
  const drillGroups = drillGroupsForPage(page.id);
  const activeDrill = activeDrillSelection(page.id, drillGroups);

  const img = document.createElement('img');
  img.src = page.imageUrl;
  img.alt = 'Illustrated page';
  img.draggable = false;

  img.onclick = (e) => {
    if (state.loading || !state.drillMode) return;
    const rect = img.getBoundingClientRect();
    const nx = (e.clientX - rect.left) / rect.width;
    const ny = (e.clientY - rect.top) / rect.height;
    // Set pending click — show marker and confirm bar
    state.pendingClick = { x: nx, y: ny };
    renderCurrentPage();
    updateUI();
  };

  container.appendChild(img);

  if (drillGroups.length) {
    // Browser-only navigation targets. Model calls use the original image file plus the selected coordinates on the server.
    const placeTarget = (target, group) => {
      const imgRect = img.getBoundingClientRect();
      const contRect = container.getBoundingClientRect();
      target.style.left = `${group.x * imgRect.width + (imgRect.left - contRect.left)}px`;
      target.style.top = `${group.y * imgRect.height + (imgRect.top - contRect.top)}px`;
    };

    for (const group of drillGroups) {
      const target = document.createElement('button');
      target.type = 'button';
      target.className = `drill-target${activeDrill?.group.key === group.key ? ' active' : ''}`;
      target.title = group.items.length > 1 ? `Open drill-ins (${group.items.length}); click again to cycle` : 'Open drill-in';
      target.innerHTML = group.items.length > 1 ? `<span class="drill-target-count">${group.items.length}</span>` : '';
      target.onclick = (event) => {
        event.stopPropagation();
        selectDrillGroup(page.id, group.key);
      };
      container.appendChild(target);
      if (img.complete) placeTarget(target, group);
      else img.addEventListener('load', () => placeTarget(target, group), { once: true });
      requestAnimationFrame(() => placeTarget(target, group));
    }
  }

  // Show the click marker if pending
  if (state.pendingClick && !state.loading) {
    const marker = document.createElement('div');
    marker.className = 'click-marker';
    // Wait for image to have dimensions
    const placeMarker = () => {
      const imgRect = img.getBoundingClientRect();
      const contRect = container.getBoundingClientRect();
      marker.style.left = `${state.pendingClick.x * imgRect.width + (imgRect.left - contRect.left)}px`;
      marker.style.top = `${state.pendingClick.y * imgRect.height + (imgRect.top - contRect.top)}px`;
    };
    marker.innerHTML = '<div class="ring"></div><div class="dot"></div>';
    container.appendChild(marker);
    if (img.complete) placeMarker(); else img.onload = placeMarker;
    requestAnimationFrame(placeMarker);

    // Confirm bar — when the parent image is classified (Phase A.3), the
    // primary button label/action come from drill_hints.suggested_default.
    // The "Drill as text ▾" popover always shows the alternatives (whichever
    // option is currently primary is omitted to avoid duplication).
    const drillHints = page.classified?.drill_hints || null;
    const primaryKind = drillHints?.suggested_default || 'image';
    const primaryLabel = drillHints?.suggested_default_label || 'Drill into image';

    const bar = document.createElement('div');
    bar.className = 'confirm-bar';
    const intentInput = document.createElement('input');
    intentInput.className = 'confirm-intent';
    intentInput.type = 'text';
    intentInput.placeholder = 'What do you want to know about this region? (optional)';
    intentInput.maxLength = 500;
    intentInput.value = state.pendingClick.intent || '';
    const depthSelect = document.createElement('select');
    depthSelect.className = 'confirm-select';
    depthSelect.innerHTML = `
      <option value="extract">Extract</option>
      <option value="explain">Explain Here</option>
      <option value="teach">Teach Concepts</option>
    `;
    depthSelect.value = state.responseDepth;
    depthSelect.onchange = () => { state.responseDepth = depthSelect.value; };

    const commit = (kind) => {
      const { x, y } = state.pendingClick;
      const intent = intentInput.value.trim();
      state.pendingClick = null;
      state.drillMode = false;
      document.removeEventListener('click', closeMenuOnOutside);
      generateChildPage(page.id, x, y, kind, intent);
    };

    // Intent quick-pick chips (only if classified). Click prefills the input.
    let chipRow = null;
    if (drillHints?.suggested_intents?.length) {
      chipRow = document.createElement('div');
      chipRow.className = 'intent-chip-row';
      const lbl = document.createElement('span');
      lbl.className = 'intent-chip-label';
      lbl.textContent = 'Try:';
      chipRow.appendChild(lbl);
      for (const text of drillHints.suggested_intents.slice(0, 4)) {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'intent-chip';
        chip.textContent = text;
        chip.title = 'Use this question (you can still edit before drilling)';
        chip.onclick = (ev) => {
          ev.preventDefault();
          intentInput.value = text;
          intentInput.focus();
        };
        chipRow.appendChild(chip);
      }
    }

    const goBtn = document.createElement('button');
    goBtn.className = 'btn confirm-go';
    goBtn.textContent = primaryLabel;
    goBtn.title = drillHints
      ? `Suggested for this image (category: ${page.classified.category})`
      : 'Generate a deeper illustration of this region';
    goBtn.onclick = () => commit(primaryKind);

    // Alternatives popover: shows every kind EXCEPT the one that's primary
    const allOptions = [
      { kind: 'image',    label: 'Drill into image', desc: 'Generate a deeper illustration of this region' },
      { kind: 'markdown', label: 'Explanation',      desc: 'Long-form prose answering "what is this?"' },
      { kind: 'chart',    label: 'Chart',            desc: 'Quantitative summary as a small chart' },
      { kind: 'table',    label: 'Table',            desc: 'Structured comparison or inventory' },
      { kind: 'diagram',  label: 'Diagram',          desc: 'Schematic relationship or flow' },
    ];
    const otherOptions = allOptions.filter(o => o.kind !== primaryKind);

    const textWrap = document.createElement('div');
    textWrap.className = 'drill-text-wrap';
    const textTrigger = document.createElement('button');
    textTrigger.className = 'btn drill-text-trigger';
    textTrigger.textContent = primaryKind === 'image' ? 'Drill as text' : 'Other format';
    textTrigger.title = 'Generate this region in a different format';
    textTrigger.onclick = (ev) => {
      ev.stopPropagation();
      textWrap.classList.toggle('open');
    };
    const textMenu = document.createElement('div');
    textMenu.className = 'drill-text-menu';
    for (const opt of otherOptions) {
      const item = document.createElement('button');
      item.type = 'button';
      item.innerHTML = `<span class="drill-text-menu-label">${escapeHtml(opt.label)}</span><span class="drill-text-menu-desc">${escapeHtml(opt.desc)}</span>`;
      item.onclick = () => { textWrap.classList.remove('open'); commit(opt.kind); };
      textMenu.appendChild(item);
    }
    textWrap.appendChild(textTrigger);
    textWrap.appendChild(textMenu);
    // Close on outside click
    const closeMenuOnOutside = (ev) => { if (!textWrap.contains(ev.target)) textWrap.classList.remove('open'); };
    document.addEventListener('click', closeMenuOnOutside, { once: false });

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.onclick = () => { document.removeEventListener('click', closeMenuOnOutside); state.pendingClick = null; renderCurrentPage(); };

    if (chipRow) bar.appendChild(chipRow);
    bar.appendChild(intentInput);
    bar.appendChild(depthSelect);
    bar.appendChild(goBtn);
    bar.appendChild(textWrap);
    bar.appendChild(cancelBtn);
    container.appendChild(bar);
    requestAnimationFrame(() => intentInput.focus());
  }

  // Loading overlay
  if (state.loading) {
    const overlay = document.createElement('div');
    overlay.className = 'loading-overlay';
    overlay.innerHTML = '<div class="spinner"></div>Generating... (30–60 sec)';
    container.appendChild(overlay);
  }

  const sourceContext = sourceContextCache[page.id];
  if (sourceContext?.content) {
    const sections = sourceContextSections(sourceContext);
    const analysis = learnCache[page.id] || {};
    const layout = document.createElement('div');
    layout.className = 'source-layout';

    const left = document.createElement('div');
    left.className = 'source-side source-left source-accordions';
    left.innerHTML = [
      sourceAccordion('Extracted Text', sections.extracted),
      sourceAccordion('Structure', sections.structure),
      sourceAccordion('Key Concepts', sections.concepts),
      analysisAccordion(page.id, 'Description', 'description', analysis.description),
      analysisAccordion(page.id, 'Concepts', 'explanation', analysis.explanation),
    ].join('');

    const center = document.createElement('div');
    center.className = 'source-center';
    center.appendChild(container);

    const right = document.createElement('div');
    right.className = 'source-side source-right';
    right.innerHTML = drillResultPanel(activeDrill);

    layout.appendChild(left);
    layout.appendChild(center);
    layout.appendChild(right);
    canvas.appendChild(layout);
    bindInlineAnalysisActions(left, page.id);
    renderMath(layout);
  } else {
    canvas.appendChild(container);
  }
}

// --- Generation ---

async function generateFirstPage(query) {
  clearError();
  setLoading(true);
  $('canvasArea').className = 'canvas-area generating';
  $('canvasArea').innerHTML = `<div class="spinner-large"></div>Choosing the right explainer format... this takes 30–60 seconds`;

  try {
    const res = await fetch('/api/page', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, mode: state.mode }),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || `Error ${res.status}`); }
    const { page } = await res.json();
    state.pages = [page];
    state.currentIndex = 0;
    state.activeDrillByParent = {};
    saveSession();
    clearError();
  } catch (err) { showError(err.message); }
  finally { setLoading(false); }
}

async function generateChildPage(parentId, x, y, responseKind = 'image', intent = '') {
  clearError();
  setLoading(true);
  try {
    const res = await fetch('/api/page', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ parentId, parentClick: { x, y }, responseKind, intent, responseDepth: state.responseDepth, language: state.language }),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || `Error ${res.status}`); }
    const { page } = await res.json();
    state.pages.push(page);
    if (page.parentId && page.parentClick) {
      const key = drillKey(page.parentClick);
      const existingCount = state.pages.filter(item => item.parentId === page.parentId && item.parentClick && drillKey(item.parentClick) === key).length;
      state.activeDrillByParent[page.parentId] = { key, index: Math.max(0, existingCount - 1) };
    }
    state.currentIndex = state.pages.length - 1;
    saveSession();
    clearError();
  } catch (err) { showError(err.message); }
  finally { setLoading(false); }
}

async function loadPageIntoSession(pageId) {
  clearError();
  showStatus('Loading saved page...');
  try {
    const page = await fetchSavedPage(pageId);
    if (!page) throw new Error('Saved page not found');
    const existing = state.pages.findIndex(p => p.id === page.id);
    if (existing >= 0) {
      state.currentIndex = existing;
    } else {
      state.pages.push(page);
      state.currentIndex = state.pages.length - 1;
    }
    state.pendingClick = null;
    state.drillMode = false;
    renderCurrentPage();
    updateUI();
    saveSession();
    closePanel('gallery');
  } catch (err) {
    showError(err.message);
  } finally {
    clearStatus();
  }
}

async function loadPagesIntoSession(pageIds) {
  clearError();
  showStatus('Loading gallery folder...');
  try {
    for (const pageId of pageIds) {
      if (state.pages.some(p => p.id === pageId)) continue;
      const page = await fetchSavedPage(pageId);
      if (page) state.pages.push(page);
    }
    if (state.pages.length) {
      state.currentIndex = state.pages.length - 1;
      state.pendingClick = null;
      state.drillMode = false;
      renderCurrentPage();
      updateUI();
      saveSession();
      closePanel('gallery');
    }
  } catch (err) {
    showError(err.message);
  } finally {
    clearStatus();
  }
}

async function translateCurrentPage(language) {
  const page = state.pages[state.currentIndex];
  if (!page || !language) return;
  clearError();
  showStatus(`Translating to ${language}...`);
  try {
    const res = await fetch(`/api/translate/${page.id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ language }),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || `Error ${res.status}`); }
    const { page: translated } = await res.json();
    if (translated && !state.pages.some(p => p.id === translated.id)) state.pages.push(translated);
    state.currentIndex = state.pages.findIndex(p => p.id === translated.id);
    renderCurrentPage();
    updateUI();
    saveSession();
  } catch (err) {
    showError(err.message);
  } finally {
    clearStatus();
  }
}

async function generateUploadContext(pageId) {
  showStatus('Analyzing upload context...');
  try {
    const res = await fetch(`/api/context/${pageId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || `Error ${res.status}`); }
    const { page } = await res.json();
    sourceContextCache[pageId] = page || null;
    renderCurrentPage();
    updateUI();
    saveSession();
  } catch (err) {
    showError(err.message);
  } finally {
    clearStatus();
  }
}

// --- Upload ---

async function uploadImage(file) {
  const label = $('topicInput').value.trim() || file.name.replace(/\.\w+$/, '');
  clearError();
  setLoading(true);
  $('canvasArea').className = 'canvas-area generating';
  $('canvasArea').innerHTML = '<div class="spinner-large"></div>Processing upload...';

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const res = await fetch('/api/upload', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageData: base64, label, mode: state.mode }),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || `Error ${res.status}`); }
    const { page } = await res.json();
    state.pages = [page];
    state.currentIndex = 0;
    state.activeDrillByParent = {};
    saveSession();
    renderCurrentPage();
    updateUI();
    clearError();
    await generateUploadContext(page.id);
  } catch (err) { showError(err.message); }
  finally { setLoading(false); }
}

// --- Gallery ---

function formatBytes(b) { return b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(0) + ' KB' : (b/1048576).toFixed(1) + ' MB'; }

async function openGallery() {
  $('galleryOverlay').classList.add('visible'); $('galleryPanel').classList.add('visible');
  $('galleryBody').innerHTML = 'Loading...';
  try {
    const res = await fetch('/api/gallery');
    const data = await res.json();
    if (!data.folders || data.folders.length === 0) {
      $('galleryBody').innerHTML = '<p style="color:#999;font-style:italic">No images yet — generate or upload one to see it here.</p>';
      return;
    }
    renderGallery(data);
  } catch (err) {
    $('galleryBody').innerHTML = `<p style="color:#b91c1c">Error loading gallery: ${escapeHtml(err.message)}</p>`;
  }
}

// Render the gallery panel with sticky search + mode pills, sorted by most-recent activity.
function renderGallery(data) {
  // Tag each folder with derived metadata: latest activity timestamp + a normalized
  // "kind" used for filtering. Uploads are detected by the upload- folder-name prefix.
  const folders = data.folders.map(f => {
    const allItems = [...(f.images || []), ...(f.texts || [])];
    const latest = allItems.reduce((acc, item) => {
      const t = new Date(item.created || 0).getTime();
      return t > acc ? t : acc;
    }, 0);
    const isUpload = (f.name || '').startsWith('upload-');
    return { ...f, _latest: latest, _isUpload: isUpload };
  }).sort((a, b) => b._latest - a._latest);

  // Build the set of distinct "kinds" for the filter pills.
  const kinds = new Map();
  kinds.set('all', { id: 'all', label: 'All', count: folders.length });
  let uploadCount = 0;
  for (const f of folders) {
    if (f._isUpload) { uploadCount++; continue; }
    const k = f.mode || 'illustration';
    if (!kinds.has(k)) {
      const mc = state.modes.find(m => m.id === k);
      kinds.set(k, { id: k, label: mc?.label || (k.charAt(0).toUpperCase() + k.slice(1).replace(/_/g, ' ')), count: 0 });
    }
    kinds.get(k).count++;
  }
  if (uploadCount > 0) kinds.set('_upload', { id: '_upload', label: 'Uploaded', count: uploadCount });

  // Build the sticky controls header
  const pillsHtml = [...kinds.values()].map(k =>
    `<button type="button" class="gallery-mode-pill${k.id === 'all' ? ' active' : ''}" data-kind="${escapeHtml(k.id)}">${escapeHtml(k.label)} <span style="opacity:0.7">${k.count}</span></button>`
  ).join('');
  let html = `<div class="gallery-controls">
    <input type="text" class="gallery-search" id="gallerySearch" placeholder="Search prompts...">
    <div class="gallery-mode-pills" id="galleryModePills">${pillsHtml}</div>
  </div>`;
  html += `<div class="gallery-base-path">${escapeHtml(data.generatedDir)}</div>`;
  html += `<div id="galleryFolderList">`;
  for (const f of folders) {
    const modeConfig = state.modes.find(m => m.id === f.mode);
    const tag = f._isUpload ? 'upload' : (modeConfig?.tagLabel || f.mode || 'illustration');
    const tagClass = f._isUpload ? 'upload' : (f.mode === 'historical_map' ? 'map' : '');
    const folderIds = [...(f.images || []), ...(f.texts || [])]
      .sort((a, b) => new Date(a.created) - new Date(b.created))
      .map(item => item.id);
    const filterKind = f._isUpload ? '_upload' : (f.mode || 'illustration');
    const searchHaystack = (f.query || '').toLowerCase();
    html += `<div class="gallery-folder" data-kind="${escapeHtml(filterKind)}" data-search="${escapeHtml(searchHaystack)}">`;
    html += `<div class="gallery-folder-header">
        <div class="gallery-folder-title-row">
          <span class="gallery-folder-title">${escapeHtml(f.query || f.name || 'Untitled')}</span>
          <button class="gallery-open-folder" data-folder-ids="${escapeHtml(folderIds.join(','))}">Open all in session</button>
        </div>
        <div class="gallery-folder-meta">
          <span class="mode-tag ${tagClass}">${escapeHtml(tag)}</span>
          <span>${f.imageCount} ${f.imageCount === 1 ? 'image' : 'images'}</span>
          ${f.textCount ? `<span class="meta-sep">·</span><span>${f.textCount} text</span>` : ''}
          <span class="meta-sep">·</span><span>${formatBytes(f.totalSize)}</span>
        </div>
      </div>`;
    html += `<div class="gallery-images">`;
    for (const img of f.images) {
      html += `<div class="gallery-img-card" data-page-id="${img.id}"><img src="${img.url}" loading="lazy" alt="${escapeHtml(f.query || 'image')}"><div class="gallery-img-meta"><span>${formatBytes(img.size)}</span></div></div>`;
    }
    html += '</div>';
    if (f.texts?.length) {
      html += '<div class="gallery-texts">';
      for (const text of f.texts) {
        html += `<div class="gallery-text-card" data-page-id="${text.id}"><div class="gallery-text-title">${escapeHtml(text.title || 'Text drill-down')}</div><div class="gallery-text-meta"><span>${formatBytes(text.size)}</span></div></div>`;
      }
      html += '</div>';
    }
    html += '</div>';
  }
  html += `</div><div class="gallery-empty-filter" id="galleryEmptyFilter" style="display:none">No folders match your filter.</div>`;
  $('galleryBody').innerHTML = html;

  // Wire up: search, mode pills, card clicks, open-folder buttons
  let activeKind = 'all';
  let activeQuery = '';
  const applyFilters = () => {
    const folderEls = $('galleryBody').querySelectorAll('.gallery-folder');
    let visible = 0;
    folderEls.forEach(el => {
      const kindOk = activeKind === 'all' || el.dataset.kind === activeKind;
      const searchOk = !activeQuery || el.dataset.search.includes(activeQuery);
      const show = kindOk && searchOk;
      el.classList.toggle('is-hidden', !show);
      if (show) visible++;
    });
    $('galleryEmptyFilter').style.display = visible === 0 ? 'block' : 'none';
  };

  $('gallerySearch').addEventListener('input', (e) => {
    activeQuery = e.target.value.trim().toLowerCase();
    applyFilters();
  });
  $('galleryModePills').addEventListener('click', (e) => {
    const pill = e.target.closest('.gallery-mode-pill');
    if (!pill) return;
    activeKind = pill.dataset.kind;
    $('galleryModePills').querySelectorAll('.gallery-mode-pill').forEach(p => p.classList.toggle('active', p === pill));
    applyFilters();
  });
  $('galleryBody').querySelectorAll('[data-page-id]').forEach(card => {
    card.addEventListener('click', () => loadPageIntoSession(card.dataset.pageId));
  });
  $('galleryBody').querySelectorAll('[data-folder-ids]').forEach(button => {
    button.addEventListener('click', (event) => {
      event.stopPropagation();
      loadPagesIntoSession(button.dataset.folderIds.split(',').filter(Boolean));
    });
  });
  // Auto-focus the search box for keyboard-first browsing
  setTimeout(() => $('gallerySearch')?.focus(), 50);
}

// --- Settings ---

async function openSettings() {
  $('settingsOverlay').classList.add('visible'); $('settingsPanel').classList.add('visible');
  $('settingsBody').innerHTML = 'Loading...';
  try {
    const res = await fetch('/api/models');
    const { current, registry } = await res.json();

    function optionsFor(capability) {
      let html = '';
      for (const [pid, prov] of Object.entries(registry)) {
        for (const m of prov.models) {
          if (m.capabilities.includes(capability)) {
            html += `<option value="${pid}/${m.id}">${prov.name} — ${m.name}</option>`;
          }
        }
      }
      return html;
    }

    $('settingsBody').innerHTML = `
      <div class="setting-group">
        <label class="setting-checkbox">
          <input type="checkbox" id="localOnlyToggle" ${current.localOnly ? 'checked' : ''}>
          <span>Keep it local
            <small>Blocks cloud model calls. Image generation and image drill-ins will stay disabled until a local image model is configured.</small>
          </span>
        </label>
      </div>
      <div class="setting-group">
        <label>Image Generation Model</label>
        <p class="desc">Used when generating the first page from a text prompt.</p>
        <select class="setting-select" id="genModelSelect">${optionsFor('generation')}</select>
        <p class="setting-current">Current: ${current.generation.provider}/${current.generation.model}</p>
      </div>
      <div class="setting-group">
        <label>Image Editing Model</label>
        <p class="desc">Used when drilling into an existing image (image + prompt → new image).</p>
        <select class="setting-select" id="editModelSelect">${optionsFor('editing')}</select>
        <p class="setting-current">Current: ${current.editing.provider}/${current.editing.model}</p>
      </div>
      <div class="setting-group">
        <label>Image Analysis Model</label>
        <p class="desc">Used by Learn, context, translation, and text/chart responses. When Keep it local is enabled, cloud fallback is disabled.</p>
        <select class="setting-select" id="analysisModelSelect">${optionsFor('analysis')}</select>
        <p class="setting-current">Current: ${current.analysis.provider}/${current.analysis.model}</p>
      </div>
      <div class="setting-group">
        <p class="desc">To add new providers (Gemini, OpenAI, etc.), add them to MODEL_REGISTRY in server.js and set the corresponding API key in .env.</p>
      </div>
      <button class="save-settings-btn" id="saveSettingsBtn">Save</button>
    `;

    $('genModelSelect').value = `${current.generation.provider}/${current.generation.model}`;
    $('editModelSelect').value = `${current.editing.provider}/${current.editing.model}`;
    $('analysisModelSelect').value = `${current.analysis.provider}/${current.analysis.model}`;
    $('localOnlyToggle').onchange = async () => {
      const r = await fetch('/api/models', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ localOnly: $('localOnlyToggle').checked }),
      });
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        showError(d.error || 'Could not save Keep it local setting');
        $('localOnlyToggle').checked = !$('localOnlyToggle').checked;
      }
    };

    $('saveSettingsBtn').onclick = async () => {
      const [gProv, gModel] = $('genModelSelect').value.split('/');
      const [eProv, eModel] = $('editModelSelect').value.split('/');
      const [aProv, aModel] = $('analysisModelSelect').value.split('/');
      const r = await fetch('/api/models', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          generation: { provider: gProv, model: gModel },
          editing: { provider: eProv, model: eModel },
          analysis: { provider: aProv, model: aModel },
          localOnly: $('localOnlyToggle').checked,
        }),
      });
      if (r.ok) { closePanel('settings'); } else { const d = await r.json(); showError(d.error); }
    };
  } catch (err) { $('settingsBody').innerHTML = `<p style="color:#b91c1c">Error: ${err.message}</p>`; }
}

// --- Learn / Analysis ---

let learnCache = {}; // pageId -> { description, explanation }
let learnActiveTab = 'description';
let learnAnalyzing = false;

function simpleMarkdown(text) {
  if (!text) return '';
  return normalizeMathText(text)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^- \*\*(.+?)\*\*:\s?(.*)$/gm, '<li><strong>$1</strong>: $2</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/^(?!<[hlu])/gm, function(m) { return m; })
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/\n/g, '<br>');
}

async function openLearn() {
  const page = state.pages[state.currentIndex];
  if (!page) return;

  $('learnOverlay').classList.add('visible');
  $('learnPanel').classList.add('visible');

  // Load cached analysis
  if (!learnCache[page.id]) {
    try {
      const res = await fetch(`/api/analysis/${page.id}`);
      learnCache[page.id] = await res.json();
    } catch { learnCache[page.id] = { description: null, explanation: null }; }
  }

  renderLearnTab();
}

function renderLearnTab() {
  const page = state.pages[state.currentIndex];
  if (!page) return;
  const data = learnCache[page.id] || {};
  const body = $('learnBody');

  // Update tab active state
  document.querySelectorAll('.learn-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === learnActiveTab));

  const content = learnActiveTab === 'description' ? data.description : data.explanation;
  const timestamp = learnActiveTab === 'description' ? data.descriptionAt : data.explanationAt;

  if (learnAnalyzing) {
    body.innerHTML = `<div class="loading-msg"><span class="spinner"></span>Analyzing image with local Gemma model... this may take 30–90 seconds</div>`;
    return;
  }

  if (content) {
    const source = learnActiveTab === 'description' ? data.descriptionSource : data.explanationSource;
    const sourceLabel = source?.includes('fallback') || source?.includes('xai') || source === 'grok' ? 'Grok API' : 'local Gemma';
    const when = timestamp ? new Date(timestamp).toLocaleString() : '';
    const meta = timestamp
      ? `Analyzed ${escapeHtml(when)} · ${escapeHtml(sourceLabel)}`
      : escapeHtml(sourceLabel);
    body.innerHTML = `<div class="learn-content">${simpleMarkdown(content)}</div>` +
      `<div class="learn-footer">` +
        `<div class="learn-meta">${meta}</div>` +
        `<div class="learn-actions">` +
          `<button type="button" class="learn-action" id="learnCopyBtn" title="Copy this tab to clipboard">📋 Copy</button>` +
          `<button type="button" class="learn-action" id="learnReanalyzeBtn" title="Regenerate this tab">↻ Re-analyze</button>` +
        `</div>` +
      `</div>`;
    renderMath(body);
    $('learnCopyBtn').onclick = async () => {
      try {
        await navigator.clipboard.writeText(content);
        const btn = $('learnCopyBtn');
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 1600);
      } catch { showError('Could not copy to clipboard'); }
    };
    $('learnReanalyzeBtn').onclick = () => runAnalysis(page.id, learnActiveTab);
    return;
  }

  // Not yet analyzed — primary action is "Analyze both" (faster than two round-trips)
  const label = learnActiveTab === 'description' ? 'description' : 'concept explanation';
  body.innerHTML = `<div class="empty-msg">No analysis yet for this page.<br>Uses your local Gemma model if vision is available, otherwise falls back to Grok API.</div>` +
    `<button class="analyze-btn" id="analyzeBothBtn">Analyze description &amp; concepts</button>` +
    `<button class="analyze-btn secondary" id="analyzeBtn">Just analyze ${escapeHtml(label)}</button>`;

  $('analyzeBothBtn').onclick = () => runAnalysis(page.id, 'both');
  $('analyzeBtn').onclick = () => runAnalysis(page.id, learnActiveTab);
}

async function runAnalysis(pageId, type) {
  learnAnalyzing = true;
  renderLearnTab();

  try {
    const res = await fetch(`/api/analysis/${pageId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type }),
    });
    const data = await res.json();
    if (data.error && !data.description && !data.explanation) {
      showError(data.error);
    }
    learnCache[pageId] = data;
  } catch (err) {
    showError('Analysis failed: ' + err.message);
  } finally {
    learnAnalyzing = false;
    renderLearnTab();
  }
}

function closePanel(name) {
  $(name + 'Overlay').classList.remove('visible');
  $(name + 'Panel').classList.remove('visible');
}


// --- Event listeners ---

$('topicForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const query = $('topicInput').value.trim();
  if (!query || state.loading) return;
  generateFirstPage(query);
});

$('drillBtn').addEventListener('click', () => {
  if (!state.loading && state.pages.length > 0) {
    state.drillMode = !state.drillMode;
    state.pendingClick = null;
    renderCurrentPage();
    updateUI();
  }
});

$('backBtn').addEventListener('click', () => {
  if (state.currentIndex > 0 && !state.loading) {
    state.currentIndex--;
    state.pendingClick = null;
    renderCurrentPage();
    updateUI();
    saveSession();
  }
});

$('resetBtn').addEventListener('click', () => {
  if (state.loading) return;
  if (state.pages.length > 3 && !confirm(`Start a new session? Your current session has ${state.pages.length} pages and will be cleared.`)) return;
  state.pages = []; state.currentIndex = -1; state.pendingClick = null; state.drillMode = false; state.activeDrillByParent = {};
  localStorage.removeItem(SESSION_KEY);
  $('topicInput').value = '';
  $('topicInput').focus();
  renderCurrentPage(); updateUI(); clearError();
});

$('uploadBtn').addEventListener('click', () => { if (!state.loading) $('fileInput').click(); });
$('fileInput').addEventListener('change', (e) => { if (e.target.files[0]) { uploadImage(e.target.files[0]); e.target.value = ''; } });

// Mode selector — change writes back to state.mode and persists via session
$('modeSelect').addEventListener('change', (e) => {
  state.mode = e.target.value || 'auto';
  if ($('topicInput')) {
    $('topicInput').placeholder = state.mode === 'auto'
      ? 'Type a topic to illustrate...'
      : (currentModeConfig().placeholder || 'Type a topic to illustrate...');
  }
});

// Empty-state interactions — delegated to canvasArea so they survive re-renders
$('canvasArea').addEventListener('click', (e) => {
  if (state.loading) return;
  const action = e.target.closest('[data-empty-action]')?.dataset.emptyAction;
  if (action === 'focus-input') { $('topicInput').focus(); return; }
  if (action === 'upload') { $('fileInput').click(); return; }
  const chip = e.target.closest('.example-chip');
  if (chip) {
    const topic = chip.dataset.topic || chip.textContent.trim();
    const presetMode = chip.dataset.mode;
    if (presetMode && $('modeSelect') && [...$('modeSelect').options].some(o => o.value === presetMode)) {
      state.mode = presetMode;
      $('modeSelect').value = presetMode;
    }
    $('topicInput').value = topic;
    $('topicForm').requestSubmit();
  }
});

$('learnBtn').addEventListener('click', openLearn);
$('learnClose').addEventListener('click', () => closePanel('learn'));
$('learnOverlay').addEventListener('click', () => closePanel('learn'));
$('learnTabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.learn-tab');
  if (!tab) return;
  learnActiveTab = tab.dataset.tab;
  renderLearnTab();
});

$('galleryBtn').addEventListener('click', openGallery);
$('galleryClose').addEventListener('click', () => closePanel('gallery'));
$('galleryOverlay').addEventListener('click', () => closePanel('gallery'));

$('settingsBtn').addEventListener('click', openSettings);
$('settingsClose').addEventListener('click', () => closePanel('settings'));
$('settingsOverlay').addEventListener('click', () => closePanel('settings'));

// Global keyboard shortcuts (skip when typing in form fields)
document.addEventListener('keydown', (e) => {
  const t = e.target;
  const tag = t?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || t?.isContentEditable) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  if (e.key === 'Escape') {
    if (state.pendingClick) { state.pendingClick = null; renderCurrentPage(); return; }
    if ($('learnPanel').classList.contains('visible')) { closePanel('learn'); return; }
    if ($('galleryPanel').classList.contains('visible')) { closePanel('gallery'); return; }
    if ($('settingsPanel').classList.contains('visible')) { closePanel('settings'); return; }
    return;
  }
  // Letter shortcuts only fire on a fresh keypress
  const k = e.key.toLowerCase();
  if (k === 'b' && !$('backBtn').disabled)   { e.preventDefault(); $('backBtn').click(); return; }
  if (k === 'd' && !$('drillBtn').disabled)  { e.preventDefault(); $('drillBtn').click(); return; }
  if (k === 'l' && !$('learnBtn').disabled)  { e.preventDefault(); $('learnBtn').click(); return; }
  if (k === 'g')                              { e.preventDefault(); $('galleryBtn').click(); return; }
  if (k === '?' || (k === '/' && e.shiftKey)){ e.preventDefault(); showShortcutsToast(); return; }
});

function showShortcutsToast() {
  const existing = document.getElementById('shortcutsToast');
  if (existing) { existing.remove(); return; }
  const el = document.createElement('div');
  el.id = 'shortcutsToast';
  el.style.cssText = 'position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #d6cfc7;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);padding:14px 18px;z-index:60;font-size:12px;color:#555;line-height:1.7;font-family:inherit;';
  el.innerHTML = '<strong style="display:block;margin-bottom:6px;color:#333">Keyboard shortcuts</strong>'
    + '<kbd style="font-family:inherit;background:#f0ede8;padding:1px 6px;border-radius:3px">B</kbd> Back · '
    + '<kbd style="font-family:inherit;background:#f0ede8;padding:1px 6px;border-radius:3px">D</kbd> Drill in · '
    + '<kbd style="font-family:inherit;background:#f0ede8;padding:1px 6px;border-radius:3px">L</kbd> Learn · '
    + '<kbd style="font-family:inherit;background:#f0ede8;padding:1px 6px;border-radius:3px">G</kbd> Gallery · '
    + '<kbd style="font-family:inherit;background:#f0ede8;padding:1px 6px;border-radius:3px">Esc</kbd> Close';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4500);
}

loadModes().then(restoreSession).finally(() => { renderCurrentPage(); updateUI(); });
</script>
