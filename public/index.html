<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illustrated Explainer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Georgia', serif; background: #faf8f5; color: #333; height: 100vh; min-height: 620px; display: flex; flex-direction: column; overflow: hidden; }

  /* --- Top bar --- */
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #fff; border-bottom: 1px solid #e8e4df; flex-shrink: 0; gap: 12px; flex-wrap: wrap; }
  .top-bar h1 { font-size: 16px; font-weight: 600; color: #555; letter-spacing: 0.5px; white-space: nowrap; }
  .top-bar .page-counter { font-size: 13px; color: #888; min-width: 50px; text-align: center; }
  .controls { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .btn { padding: 5px 14px; border: 1px solid #ccc; background: #fff; border-radius: 6px; font-family: inherit; font-size: 12px; cursor: pointer; color: #555; transition: all 0.15s; }
  .btn:hover:not(:disabled) { background: #f0ede8; border-color: #aaa; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn.drill-btn { padding: 8px 20px; border-color: #a23b31; background: #fff7f5; color: #8f2d25; font-size: 13px; font-weight: 800; box-shadow: inset 0 0 0 1px rgba(162,59,49,0.08); }
  .btn.drill-btn:not(:disabled)::before { content: "◎ "; font-weight: 700; }
  .btn.drill-btn:hover:not(:disabled) { background: #fff1ef; border-color: #8f2d25; }
  .btn.drill-btn.active { background: #a23b31; color: #fff; border-color: #a23b31; box-shadow: 0 0 0 2px rgba(162,59,49,0.18); }
  .btn.drill-btn.active:hover { background: #842e28; }
  .global-language { width: 120px; padding: 5px 9px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; font-size: 12px; color: #555; background: #fff; }

  /* --- Topic area --- */
  .topic-area { display: flex; justify-content: center; padding: 14px 20px; flex-shrink: 0; }
  .topic-form { display: flex; gap: 8px; width: 100%; max-width: 700px; align-items: center; flex-wrap: wrap; }
  .topic-input { flex: 1; min-width: 180px; padding: 8px 14px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; font-size: 14px; background: #fff; outline: none; }
  .topic-input:focus { border-color: #999; }
  .topic-input:disabled { opacity: 0.5; }
  .generate-btn { padding: 8px 20px; background: #5a7d6a; color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
  .generate-btn:hover:not(:disabled) { background: #4a6a58; }
  .generate-btn:disabled { opacity: 0.5; cursor: default; }
  .upload-btn { padding: 8px 14px; background: #fff; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; font-size: 12px; cursor: pointer; color: #555; }
  .upload-btn:hover { background: #f0ede8; border-color: #aaa; }
  .upload-btn:disabled { opacity: 0.5; cursor: default; }

  /* --- Canvas area --- */
  .canvas-area { flex: 1 1 auto; display: flex; align-items: flex-start; justify-content: center; padding: 12px 20px; position: relative; min-height: 0; overflow: hidden; }
  .canvas-area.empty { color: #bbb; font-size: 15px; font-style: italic; }
  .canvas-area.generating { color: #777; font-size: 15px; flex-direction: column; gap: 14px; }
  .canvas-area.generating .spinner-large { width: 36px; height: 36px; border: 4px solid #ddd; border-top-color: #5a7d6a; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .status-note { position: fixed; right: 16px; bottom: 84px; z-index: 20; background: #fff; border: 1px solid #e0dcd7; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); padding: 9px 12px; font-size: 12px; color: #6b5a3e; display: flex; align-items: center; gap: 8px; max-width: min(360px, calc(100vw - 32px)); }
  .status-note .spinner { width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #5a7d6a; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  .image-container { position: relative; max-width: 100%; max-height: 100%; }
  .image-container.clickable { cursor: crosshair; }
  .image-container img { display: block; max-width: 100%; max-height: 100%; border-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .source-layout { width: min(1600px, 100%); height: 100%; display: grid; grid-template-columns: minmax(280px, 0.85fr) minmax(520px, 1.55fr) minmax(300px, 0.9fr); gap: 16px; align-items: stretch; overflow: hidden; }
  .source-layout .image-container { display: flex; align-items: flex-start; justify-content: center; min-width: 0; min-height: 0; }
  .source-layout .image-container img { max-height: 100%; width: auto; }
  .source-side { display: grid; gap: 12px; min-width: 0; min-height: 0; height: 100%; overflow: hidden; }
  .source-left { align-content: start; grid-auto-rows: max-content; overflow: auto; padding-right: 2px; }
  .source-center { display: flex; align-items: flex-start; justify-content: center; min-width: 0; min-height: 0; overflow: hidden; }
  .source-right { grid-template-rows: minmax(0, 1fr); }
  .source-panel { background: #fff; border: 1px solid #e8e4df; border-radius: 8px; box-shadow: 0 1px 8px rgba(0,0,0,0.04); padding: 12px 14px; min-height: 0; overflow: auto; }
  .source-panel.tall { height: 100%; }
  .source-panel.split { max-height: none; }
  .source-left .source-panel, .source-right .source-panel { min-height: 0; max-height: none; }
  .source-panel h2 { font-size: 14px; color: #4f463b; margin: 0 0 8px; border-bottom: 1px solid #ece6de; padding-bottom: 5px; }
  .source-panel .source-content { font-size: 13px; line-height: 1.55; color: #48433d; }
  .source-panel .source-content h1 { font-size: 16px; margin: 0 0 8px; }
  .source-panel .source-content h2 { font-size: 13px; margin: 12px 0 6px; border: 0; padding: 0; }
  .source-panel .source-content ul, .source-panel .source-content ol { margin: 0 0 8px 18px; }
  .source-panel .source-content li { margin-bottom: 4px; }
  .source-panel.drill-result { border-color: #ead0cc; }
  .source-panel.drill-result .drill-result-meta { font-size: 11px; color: #8b6f6a; margin: -2px 0 8px; }
  .source-panel.drill-result img { display: block; width: 100%; border-radius: 4px; border: 1px solid #eadfdc; }
  .source-panel.drill-result svg { width: 100%; height: auto; }
  .inline-analysis-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .inline-analysis-actions button { padding: 5px 9px; border: 1px solid #d6cfc7; border-radius: 5px; background: #f8f5f0; color: #5e5144; font-family: inherit; font-size: 11px; cursor: pointer; }
  .source-accordions { display: grid; gap: 8px; align-content: start; }
  .source-accordion { background: #fff; border: 1px solid #e8e4df; border-radius: 7px; box-shadow: 0 1px 6px rgba(0,0,0,0.035); overflow: hidden; }
  .source-accordion summary { cursor: pointer; padding: 8px 11px; font-size: 13px; font-weight: 700; color: #4f463b; list-style-position: inside; }
  .source-accordion[open] summary { border-bottom: 1px solid #ece6de; }
  .source-accordion-content { max-height: 260px; overflow: auto; padding: 10px 12px; font-size: 13px; line-height: 1.55; color: #48433d; }
  .empty-drill { color: #8a7d70; font-size: 13px; line-height: 1.55; }
  @media (max-width: 1050px) {
    body { overflow: auto; height: auto; }
    .canvas-area { overflow: visible; }
    .source-layout { height: auto; overflow: visible; grid-template-columns: 1fr; }
    .source-side, .source-left, .source-right { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: none; height: auto; overflow: visible; }
    .source-center { overflow: visible; }
    .source-panel.tall, .source-panel.split { max-height: 260px; }
  }
  @media (max-width: 700px) {
    .source-side, .source-left, .source-right { display: grid; grid-template-columns: 1fr; }
  }
  .loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(250,248,245,0.85); border-radius: 4px; font-size: 14px; color: #777; }
  .loading-overlay .spinner { width: 22px; height: 22px; border: 3px solid #ddd; border-top-color: #5a7d6a; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- Click marker (visual confirmation) --- */
  .click-marker { position: absolute; pointer-events: none; transform: translate(-50%, -50%); z-index: 5; }
  .click-marker .ring { width: 48px; height: 48px; border-radius: 50%; border: 3px solid rgba(220,50,50,0.8); background: rgba(220,50,50,0.12); animation: marker-pulse 1.5s ease-in-out infinite; }
  .click-marker .dot { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border-radius: 50%; background: rgba(220,50,50,0.85); transform: translate(-50%, -50%); }
  .drill-target { position: absolute; width: 34px; height: 34px; border-radius: 50%; border: 3px solid rgba(190,35,35,0.95); background: rgba(220,50,50,0.14); transform: translate(-50%, -50%); z-index: 4; cursor: pointer; box-shadow: 0 1px 7px rgba(80,0,0,0.24); }
  .drill-target:hover, .drill-target.active { background: rgba(220,50,50,0.26); border-color: rgba(150,20,20,1); }
  .drill-target-count { position: absolute; right: -8px; bottom: -8px; min-width: 18px; height: 18px; padding: 0 4px; border-radius: 999px; background: #fff; border: 1px solid rgba(190,35,35,0.85); color: #9c2525; font-size: 11px; line-height: 16px; text-align: center; font-weight: 700; }
  @keyframes marker-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } }

  /* Confirm bar */
  .confirm-bar { position: absolute; bottom: 12px; left: 12px; right: 12px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; z-index: 6; background: #fff; padding: 8px 12px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); border: 1px solid #e0dcd7; max-width: calc(100% - 24px); }
  .confirm-intent { flex: 1 1 280px; min-width: min(220px, 100%); padding: 6px 10px; border: 1px solid #d5d0ca; border-radius: 6px; font-family: inherit; font-size: 13px; outline: none; }
  .confirm-intent:focus { border-color: #999; }
  .confirm-select { flex: 0 1 140px; min-width: 115px; padding: 6px 9px; border: 1px solid #d5d0ca; border-radius: 6px; font-family: inherit; font-size: 12px; background: #fff; color: #555; }
  .confirm-bar .btn { flex: 0 0 auto; min-width: 68px; font-size: 13px; padding: 6px 12px; white-space: nowrap; }
  .confirm-bar .btn.confirm-go { background: #5a7d6a; color: #fff; border-color: #5a7d6a; }
  .confirm-bar .btn.confirm-go:hover { background: #4a6a58; }
  .confirm-bar .btn.confirm-text { background: #6b5a3e; color: #fff; border-color: #6b5a3e; }
  .confirm-bar .btn.confirm-text:hover { background: #58492f; }
  .confirm-bar .btn.confirm-chart { background: #496a7a; color: #fff; border-color: #496a7a; }
  .confirm-bar .btn.confirm-chart:hover { background: #385665; }
  @media (max-width: 720px) {
    .confirm-bar { left: 8px; right: 8px; bottom: 8px; max-width: calc(100% - 16px); }
    .confirm-intent, .confirm-select { flex: 1 1 100%; }
  }

  /* --- Error banner --- */
  .error-banner { display: none; padding: 6px 20px; background: #fef2f2; color: #b91c1c; font-size: 12px; text-align: center; border-top: 1px solid #fecaca; flex-shrink: 0; }
  .error-banner.visible { display: block; }

  /* --- Thumbnail strip --- */
  .thumbnail-strip { display: flex; gap: 6px; padding: 7px 20px; background: #fff; border-top: 1px solid #e8e4df; overflow-x: auto; flex-shrink: 0; min-height: 58px; align-items: center; }
  .thumbnail-strip.hidden { display: none; }
  .thumb { width: 74px; height: 42px; border-radius: 4px; object-fit: cover; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; opacity: 0.6; transition: all 0.15s; }
  .thumb:hover { opacity: 0.9; }
  .thumb.active { border-color: #5a7d6a; opacity: 1; box-shadow: 0 0 0 1px #5a7d6a; }
  .thumb-index { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
  .thumb-index span { font-size: 10px; color: #999; }
  .text-thumb { width: 74px; height: 42px; border-radius: 4px; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; opacity: 0.65; transition: all 0.15s; background: #fff; color: #6b5a3e; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: inset 0 0 0 1px #e8e4df; }
  .text-thumb:hover { opacity: 0.9; }
  .text-thumb.active { border-color: #5a7d6a; opacity: 1; box-shadow: 0 0 0 1px #5a7d6a; }

  /* --- Text pages --- */
  .text-page { width: min(840px, 100%); max-height: calc(100vh - 260px); overflow-y: auto; background: #fff; border: 1px solid #e8e4df; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 28px 34px; }
  .text-page-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding-bottom: 12px; margin-bottom: 18px; border-bottom: 1px solid #e8e4df; }
  .text-page-title { font-size: 18px; font-weight: 700; color: #333; }
  .text-page-kind { font-size: 11px; color: #8a785d; background: #f5efe4; border: 1px solid #e6d8bf; padding: 3px 8px; border-radius: 999px; white-space: nowrap; }
  .text-page-content { font-size: 15px; line-height: 1.7; color: #3d3a36; }
  .text-page-content h1 { font-size: 22px; margin: 0 0 12px; }
  .text-page-content h2 { font-size: 17px; margin: 20px 0 8px; color: #333; }
  .text-page-content p { margin-bottom: 12px; }
  .text-page-content ul, .text-page-content ol { margin: 0 0 12px 24px; }
  .text-page-content li { margin-bottom: 5px; }
  .text-page-content code { font-family: monospace; background: #f0ede8; padding: 1px 5px; border-radius: 3px; font-size: 13px; }
  .text-page-content mjx-container[jax="CHTML"][display="true"],
  .learn-content mjx-container[jax="CHTML"][display="true"] { margin: 14px 0; overflow-x: auto; overflow-y: hidden; max-width: 100%; }
  .text-page-content mjx-container,
  .learn-content mjx-container { font-size: 105%; }
  .text-page-source { margin-top: 18px; font-size: 11px; color: #aaa; text-align: right; }
  .renderer-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .renderer-action-btn { padding: 4px 9px; border: 1px solid #d5d0ca; border-radius: 5px; background: #fff; color: #555; font-family: inherit; font-size: 11px; cursor: pointer; }
  .renderer-action-btn:hover { background: #f7f5f2; border-color: #aaa; }
  .renderer-language { width: 110px; padding: 4px 7px; border: 1px solid #d5d0ca; border-radius: 5px; font-family: inherit; font-size: 11px; }
  .chart-page { width: min(900px, 100%); max-height: calc(100vh - 260px); overflow-y: auto; background: #fff; border: 1px solid #e8e4df; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 24px 28px; }
  .chart-page svg { display: block; width: 100%; height: auto; overflow: visible; }
  .chart-reliability { margin: 12px 0 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; font-size: 12px; color: #5f5548; }
  .chart-pill { border: 1px solid #d9d1c6; background: #f7f3ee; border-radius: 999px; padding: 4px 9px; }
  .chart-pill.warn { border-color: #efd09a; background: #fff7e8; color: #7a5a19; }
  .chart-pill.bad { border-color: #ecc1bd; background: #fff0ef; color: #94352d; }
  .chart-fallback { margin: 12px 0; font-size: 13px; line-height: 1.5; color: #6f4e12; background: #fff8e8; border: 1px solid #f0dfb8; border-radius: 6px; padding: 10px 12px; }
  .chart-notes { margin: 14px 0 0 18px; font-size: 13px; line-height: 1.5; color: #555; }
  .chart-evidence { margin: 14px 0 0 18px; font-size: 12px; line-height: 1.5; color: #555; }
  .chart-uncertainty { margin-top: 12px; font-size: 12px; color: #8a6d3b; background: #fff8e8; border: 1px solid #f0dfb8; border-radius: 6px; padding: 8px 10px; }
  .table-wrap { width: 100%; overflow-x: auto; margin-top: 10px; }
  .drill-table { width: 100%; border-collapse: collapse; font-size: 14px; color: #444; }
  .drill-table th, .drill-table td { border: 1px solid #e4ded6; padding: 9px 10px; text-align: left; vertical-align: top; line-height: 1.4; }
  .drill-table th { background: #f4f0ea; color: #3e362d; font-weight: 700; }
  .drill-table tr:nth-child(even) td { background: #fdfbf8; }
  .diagram-page svg { display: block; width: 100%; height: auto; margin-top: 8px; }
  .diagram-notes { margin: 14px 0 0 18px; font-size: 13px; line-height: 1.5; color: #555; }

  /* --- Slide panels (gallery, settings) --- */
  .panel-overlay { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.3); }
  .panel-overlay.visible { display: block; }
  .slide-panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(520px, 90vw); background: #fff; border-left: 1px solid #e8e4df; z-index: 51; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s ease; box-shadow: -4px 0 24px rgba(0,0,0,0.08); }
  .slide-panel.visible { transform: translateX(0); }
  .panel-header { padding: 14px 18px; border-bottom: 1px solid #e8e4df; display: flex; justify-content: space-between; align-items: center; }
  .panel-header h2 { font-size: 15px; font-weight: 600; color: #444; }
  .panel-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; padding: 4px 8px; }
  .panel-close:hover { color: #333; }
  .panel-body { flex: 1; overflow-y: auto; padding: 16px 18px; }

  /* Gallery items */
  .gallery-base-path { font-size: 11px; color: #999; font-family: monospace; padding: 6px 10px; background: #f7f5f2; border-radius: 4px; margin-bottom: 14px; word-break: break-all; }
  .gallery-folder { margin-bottom: 16px; border: 1px solid #e8e4df; border-radius: 6px; overflow: hidden; }
  .gallery-folder-header { padding: 8px 12px; background: #faf8f5; border-bottom: 1px solid #e8e4df; display: flex; justify-content: space-between; align-items: center; }
  .gallery-folder-title { font-size: 12px; font-weight: 600; color: #444; }
  .gallery-folder-meta { font-size: 11px; color: #999; display: flex; gap: 8px; align-items: center; }
  .mode-tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: #e8f5e9; color: #2e7d32; }
  .mode-tag.map { background: #fff3e0; color: #6b5a3e; }
  .gallery-folder-path { font-size: 10px; color: #bbb; font-family: monospace; padding: 4px 12px; word-break: break-all; }
  .gallery-images { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 6px; padding: 8px 12px; }
  .gallery-img-card { border-radius: 4px; overflow: hidden; border: 1px solid #e8e4df; cursor: pointer; }
  .gallery-img-card:hover { border-color: #aaa; }
  .gallery-img-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .gallery-img-meta { font-size: 9px; color: #999; padding: 3px 6px; font-family: monospace; display: flex; justify-content: space-between; }
  .gallery-texts { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 6px; padding: 0 12px 10px; }
  .gallery-text-card { border-radius: 4px; border: 1px solid #e8e4df; background: #fff; padding: 8px 10px; }
  .gallery-text-title { font-size: 12px; font-weight: 600; color: #4b4032; line-height: 1.3; margin-bottom: 5px; }
  .gallery-text-meta { font-size: 9px; color: #999; font-family: monospace; display: flex; justify-content: space-between; gap: 8px; }
  .gallery-open-folder { padding: 3px 8px; border: 1px solid #d5d0ca; border-radius: 5px; background: #fff; font-family: inherit; font-size: 10px; color: #555; cursor: pointer; }
  .gallery-open-folder:hover { background: #f0ede8; }

  /* Settings panel */
  .setting-group { margin-bottom: 20px; }
  .setting-group label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; }
  .setting-group .desc { font-size: 11px; color: #999; margin-bottom: 8px; }
  .setting-select { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; font-size: 13px; background: #fff; }
  .setting-current { font-size: 11px; color: #888; font-family: monospace; margin-top: 4px; }
  .setting-group label.setting-checkbox { display: flex; gap: 9px; align-items: flex-start; padding: 10px 12px; border: 1px solid #e0dcd7; border-radius: 6px; background: #fff; margin-bottom: 0; }
  .setting-checkbox input { margin-top: 2px; }
  .setting-checkbox span { display: block; font-size: 13px; font-weight: 600; color: #444; }
  .setting-checkbox small { display: block; margin-top: 3px; font-size: 11px; line-height: 1.35; color: #888; }
  .save-settings-btn { padding: 8px 20px; background: #5a7d6a; color: #fff; border: none; border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
  .save-settings-btn:hover { background: #4a6a58; }

  /* Hidden file input */
  #fileInput { display: none; }

  /* --- Learn panel (analysis) --- */
  .learn-panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(580px, 92vw); background: #faf8f5; border-left: 1px solid #e0dcd7; z-index: 51; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s ease; box-shadow: -4px 0 24px rgba(0,0,0,0.08); }
  .learn-panel.visible { transform: translateX(0); }
  .learn-header { padding: 14px 18px; border-bottom: 1px solid #e8e4df; display: flex; justify-content: space-between; align-items: center; background: #fff; }
  .learn-header h2 { font-size: 15px; font-weight: 600; color: #444; }

<script>
const state = {
  pages: [],
  currentIndex: -1,
  loading: false,
  drillMode: false,
  mode: 'auto',
  modes: [],
  responseDepth: 'explain',
  language: '',
  pendingClick: null, // { x, y } — awaiting confirmation
  activeDrillByParent: {}, // parent page id -> { key, index }
};

const $ = id => document.getElementById(id);
const SESSION_KEY = 'illustratedExplainer.session.v1';
const sourceContextCache = {}; // pageId -> source context page or null
const sourceContextRequests = {}; // pageId -> Promise
const inlineAnalysisRequests = {}; // pageId -> Promise

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderMath(root = document.body) {
  const run = () => {
    if (!window.MathJax?.typesetPromise || !root?.isConnected) return;
    window.MathJax.typesetClear?.([root]);
    window.MathJax.typesetPromise([root]).catch(err => {
      console.warn('MathJax render failed:', err);
    });
  };
  if (window.MathJax?.startup?.promise) {
    window.MathJax.startup.promise.then(run).catch(() => {});
  } else if (window.MathJax?.typesetPromise) {
    run();
  } else {
    setTimeout(() => renderMath(root), 250);
  }
}

function normalizeMathText(text) {
  return String(text || '')
    .replace(/\$\$([\s\S]*?)\$\$/g, (_m, expr) => `$$${expr.trim()}$$`)
    .replace(/\$\\frac/g, '$\\frac')
    .replace(/([,.;:])\s*\$(\s+)/g, '$1$2');
}

function clamp(n, min, max) {
  return Math.max(min, Math.min(max, n));
}

function chartSvg(chart) {
  const spec = chart || {};
  const points = Array.isArray(spec.points) ? spec.points.filter(p => Number.isFinite(Number(p.y))) : [];
  const safePoints = points.length ? points : [{ label: 'No data', x: 0, y: 0 }];
  const w = 820, h = 430;
  const m = { top: 46, right: 34, bottom: 76, left: 76 };
  const plotW = w - m.left - m.right;
  const plotH = h - m.top - m.bottom;
  const ys = safePoints.map(p => Number(p.y));
  const xs = safePoints.map((p, i) => Number.isFinite(Number(p.x)) ? Number(p.x) : i);
  const minY = Math.min(0, ...ys);
  const maxY = Math.max(1, ...ys);
  const minX = Math.min(...xs);
  const maxX = Math.max(minX + 1, ...xs);
  const yScale = y => m.top + plotH - ((y - minY) / (maxY - minY || 1)) * plotH;
  const xScale = (x, i) => spec.type === 'bar'
    ? m.left + (i + 0.5) * (plotW / safePoints.length)
    : m.left + ((x - minX) / (maxX - minX || 1)) * plotW;
  const axis = `<line x1="${m.left}" y1="${m.top}" x2="${m.left}" y2="${m.top + plotH}" stroke="#333"/><line x1="${m.left}" y1="${m.top + plotH}" x2="${m.left + plotW}" y2="${m.top + plotH}" stroke="#333"/>`;
  const yTicks = Array.from({ length: 5 }, (_, i) => minY + (i * (maxY - minY) / 4)).map(v => {
    const y = yScale(v);
    return `<line x1="${m.left - 5}" y1="${y}" x2="${m.left + plotW}" y2="${y}" stroke="#eee"/><text x="${m.left - 10}" y="${y + 4}" text-anchor="end" font-size="12" fill="#666">${escapeHtml(v.toFixed(1).replace(/\.0$/, ''))}</text>`;
  }).join('');
  const xLabels = safePoints.map((p, i) => {
    if (safePoints.length > 12 && i % Math.ceil(safePoints.length / 10) !== 0) return '';
    const x = xScale(xs[i], i);
    return `<text x="${x}" y="${m.top + plotH + 22}" text-anchor="middle" font-size="11" fill="#666">${escapeHtml(String(p.label ?? xs[i]).slice(0, 14))}</text>`;
  }).join('');

  let marks = '';
  if (spec.type === 'bar') {
    const band = plotW / safePoints.length;
    marks = safePoints.map((p, i) => {
      const y = yScale(Number(p.y));
      const base = yScale(0);
      const x = m.left + i * band + band * 0.18;
      const title = `${p.label}: ${p.y}${p.confidence != null ? ` (${Math.round(Number(p.confidence) * 100)}% confidence)` : ''}${p.evidence ? ` - ${p.evidence}` : ''}`;
      return `<rect x="${x}" y="${Math.min(y, base)}" width="${band * 0.64}" height="${Math.abs(base - y)}" fill="#5a7d6a"/><title>${escapeHtml(title)}</title>`;
    }).join('');
  } else {
    const path = safePoints.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xScale(xs[i], i)} ${yScale(Number(p.y))}`).join(' ');
    marks = `<path d="${path}" fill="none" stroke="#496a7a" stroke-width="3"/>` + safePoints.map((p, i) => {
      const title = `${p.label}: ${p.y}${p.confidence != null ? ` (${Math.round(Number(p.confidence) * 100)}% confidence)` : ''}${p.evidence ? ` - ${p.evidence}` : ''}`;
      return `<circle cx="${xScale(xs[i], i)}" cy="${yScale(Number(p.y))}" r="${spec.type === 'scatter' ? 5 : 4}" fill="#5a7d6a"><title>${escapeHtml(title)}</title></circle>`;
    }).join('');
  }

  return `<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="${escapeHtml(spec.title || 'Chart')}">
    <text x="${w / 2}" y="24" text-anchor="middle" font-size="20" font-weight="700" fill="#333">${escapeHtml(spec.title || 'Chart')}</text>
    ${yTicks}${axis}${marks}${xLabels}
    <text x="${w / 2}" y="${h - 18}" text-anchor="middle" font-size="13" fill="#555">${escapeHtml(spec.xLabel || 'x')}</text>
    <text transform="translate(18 ${h / 2}) rotate(-90)" text-anchor="middle" font-size="13" fill="#555">${escapeHtml(spec.yLabel || 'y')}</text>
  </svg>`;
}

function tableHtml(table) {
  const spec = table || {};
  const columns = Array.isArray(spec.columns) && spec.columns.length ? spec.columns : ['Item', 'Explanation'];
  const rows = Array.isArray(spec.rows) ? spec.rows : [];
  const head = columns.map(column => `<th>${escapeHtml(column)}</th>`).join('');
  const body = rows.length
    ? rows.map(row => `<tr>${columns.map((_column, i) => `<td>${escapeHtml(row?.[i] ?? '')}</td>`).join('')}</tr>`).join('')
    : `<tr><td colspan="${columns.length}">No table rows were returned.</td></tr>`;
  return `<div class="table-wrap"><table class="drill-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}

function wrapSvgText(text, maxChars = 18, maxLines = 3) {
  const words = String(text || '').split(/\s+/).filter(Boolean);
  const lines = [];
  let current = '';
  for (const word of words) {
    const next = current ? `${current} ${word}` : word;
    if (next.length > maxChars && current) {
      lines.push(current);
      current = word;
    } else {
      current = next;
    }
    if (lines.length >= maxLines) break;
  }
  if (current && lines.length < maxLines) lines.push(current);
  return lines.length ? lines : [''];
}

function diagramSvg(diagram) {
  const spec = diagram || {};
  const nodes = Array.isArray(spec.nodes) && spec.nodes.length ? spec.nodes : [{ id: 'n1', label: 'Selected region', kind: 'concept' }];
  const edges = Array.isArray(spec.edges) ? spec.edges : [];
  const isLR = spec.direction === 'LR';
  const w = 900;
  const h = Math.max(360, isLR ? 280 + Math.ceil(nodes.length / 2) * 80 : 170 + nodes.length * 92);
  const boxW = isLR ? 190 : 260;
  const boxH = 66;
  const colors = {
    concept: ['#f8f5ef', '#8a785d'],
    process: ['#eef5f0', '#5a7d6a'],
    data: ['#eef4f7', '#496a7a'],
    warning: ['#fff8e8', '#b2873b'],
    result: ['#f2f0f7', '#6e6188'],
  };
  const positions = new Map();
  nodes.forEach((node, i) => {
    const x = isLR
      ? 70 + (i % Math.max(1, Math.ceil(nodes.length / 2))) * Math.min(230, (w - 150) / Math.max(1, Math.ceil(nodes.length / 2)))
      : (w - boxW) / 2;
    const y = isLR
      ? 92 + Math.floor(i / Math.max(1, Math.ceil(nodes.length / 2))) * 132
      : 82 + i * 92;
    positions.set(node.id, { x, y });
  });
  const marker = `<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8277"/></marker></defs>`;
  const edgeEls = edges.map(edge => {
    const from = positions.get(edge.from);
    const to = positions.get(edge.to);
    if (!from || !to) return '';
    const x1 = from.x + boxW / 2;
    const y1 = from.y + boxH;
    const x2 = to.x + boxW / 2;
    const y2 = to.y;
    const midX = (x1 + x2) / 2;
    const midY = (y1 + y2) / 2;
    return `<path d="M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}" fill="none" stroke="#8a8277" stroke-width="2" marker-end="url(#arrow)"/>${edge.label ? `<text x="${midX}" y="${midY - 6}" text-anchor="middle" font-size="11" fill="#6b6258">${escapeHtml(edge.label)}</text>` : ''}`;
  }).join('');
  const nodeEls = nodes.map(node => {
    const pos = positions.get(node.id);
    const [fill, stroke] = colors[node.kind] || colors.concept;
    const labelLines = wrapSvgText(node.label, 22, 2);
    const detailLines = node.detail ? wrapSvgText(node.detail, 28, 1) : [];
    const labelText = labelLines.map((line, i) => `<tspan x="${pos.x + boxW / 2}" dy="${i ? 16 : 0}">${escapeHtml(line)}</tspan>`).join('');
    const detailText = detailLines.map(line => `<text x="${pos.x + boxW / 2}" y="${pos.y + 50}" text-anchor="middle" font-size="10" fill="#777">${escapeHtml(line)}</text>`).join('');
    return `<rect x="${pos.x}" y="${pos.y}" width="${boxW}" height="${boxH}" rx="7" fill="${fill}" stroke="${stroke}" stroke-width="2"/><text x="${pos.x + boxW / 2}" y="${pos.y + 25}" text-anchor="middle" font-size="13" font-weight="700" fill="#333">${labelText}</text>${detailText}`;
  }).join('');
  return `<svg class="diagram-svg" viewBox="0 0 ${w} ${h}" role="img" aria-label="${escapeHtml(spec.title || 'Diagram')}">
    ${marker}
    <text x="${w / 2}" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#333">${escapeHtml(spec.title || 'Diagram')}</text>
    ${edgeEls}
    ${nodeEls}
  </svg>`;
}

// --- Core functions ---

function currentModeConfig() {
  return state.modes.find(m => m.id === state.mode) || {
    id: 'auto',
    label: 'Smart',
    tagLabel: 'smart',
    placeholder: "Ask for any explainer, equation, science process, historical map, or diagram...",
  };
}

function renderModeSelector() {
  if ($('topicInput')) $('topicInput').placeholder = currentModeConfig().placeholder;
}

async function loadModes() {
  try {
    const res = await fetch('/api/modes');
    if (!res.ok) throw new Error(`Error ${res.status}`);
    const data = await res.json();
    state.modes = data.modes || [];
    state.mode = 'auto';
    renderModeSelector();
  } catch (err) {
    console.warn('Failed to load modes:', err);
    state.modes = [];
    renderModeSelector();
  }
}

function setLoading(loading) {
  state.loading = loading;
  $('topicInput').disabled = loading;
  $('generateBtn').disabled = loading;
  $('uploadBtn').disabled = loading;
  renderCurrentPage();
  updateUI();
}

function showError(msg) { $('errorBanner').textContent = msg; $('errorBanner').classList.add('visible'); }
function clearError() { $('errorBanner').classList.remove('visible'); }
function showStatus(msg) { $('statusNote').innerHTML = `<span class="spinner"></span>${escapeHtml(msg)}`; $('statusNote').style.display = 'flex'; }
function clearStatus() { $('statusNote').style.display = 'none'; $('statusNote').innerHTML = ''; }

function rendererActions(page) {
  const language = escapeHtml(state.language || '');
  const canTranslate = page.type === 'markdown' || page.type === 'chart' || page.type === 'table' || page.type === 'diagram';
  const translate = canTranslate
    ? `<input class="renderer-language" id="rendererLanguage" placeholder="Language" value="${language}"><button class="renderer-action-btn" id="translatePageBtn">Translate</button>`
    : '';
  const removable = state.pages.length > 1
    ? `<button class="renderer-action-btn" id="removePageBtn">Remove</button>`
    : '';
  return `<div class="renderer-actions">${translate}${removable}</div>`;
}

function bindRendererActions(page) {
  const translateBtn = $('translatePageBtn');
  if (translateBtn) {
    translateBtn.onclick = () => {
      const language = $('rendererLanguage')?.value.trim();
      if (language) {
        state.language = language;
        translateCurrentPage(language);
      }
    };
  }
  const removeBtn = $('removePageBtn');
  if (removeBtn) removeBtn.onclick = () => removeCurrentPage();
}

function removeCurrentPage() {
  if (state.pages.length <= 1 || state.currentIndex < 0) return;
  state.pages.splice(state.currentIndex, 1);
  state.currentIndex = clamp(state.currentIndex, 0, state.pages.length - 1);
  state.pendingClick = null;
  state.drillMode = false;
  renderCurrentPage();
  updateUI();
  saveSession();
}

function saveSession() {
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      pageIds: state.pages.map(p => p.id),
      currentIndex: state.currentIndex,
      mode: state.mode,
      responseDepth: state.responseDepth,
      language: state.language,
      activeDrillByParent: state.activeDrillByParent,
      savedAt: new Date().toISOString(),
    }));
  } catch (err) {
    console.warn('Failed to save session:', err);
  }
}

async function fetchSavedPage(pageId) {
  const res = await fetch(`/api/page/${pageId}`);
  if (!res.ok) return null;
  const { page } = await res.json();
  return page;
}

// When an image page is loaded into the session (gallery click, session restore,
// or a cache-hit on generation), the saved-page response only returns that page.
// The server still has any drill-down descendants on disk; pull them lazily so
// the persistent drill-target markers reappear without forcing the user to
// re-navigate. Dedup by pageId so we never refetch in the same tab.
const _descendantsFetched = new Set();
async function ensureDescendantsLoaded(pageId) {
  if (!pageId || _descendantsFetched.has(pageId)) return;
  _descendantsFetched.add(pageId);
  try {
    const res = await fetch(`/api/page/${pageId}/children`);
    if (!res.ok) return;
    const { children } = await res.json();
    if (!Array.isArray(children) || !children.length) return;
    let added = 0;
    for (const child of children) {
      if (!child || !child.id) continue;
      if (state.pages.some(p => p.id === child.id)) continue;
      state.pages.push(child);
      added++;
    }
    if (added) {
      // Re-render to surface the now-derivable drill targets; do not move
      // currentIndex — user stays on the page they were viewing.
      renderCurrentPage();
      updateUI();
      saveSession();
    }
  } catch (err) {
    console.warn('ensureDescendantsLoaded failed:', err);
  }
}

async function restoreSession() {
  let saved;
  try {
    saved = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
  } catch {
    return;
  }
  if (!saved?.pageIds?.length) return;

  showStatus('Restoring last exploration...');
  try {
    const pages = [];
    for (const id of saved.pageIds) {
      if (!/^[a-f0-9]{16}$/.test(id)) continue;
      const page = await fetchSavedPage(id);
      if (page) pages.push(page);
    }
    if (pages.length) {
      state.pages = pages;
      state.currentIndex = clamp(Number(saved.currentIndex) || 0, 0, pages.length - 1);
      state.mode = 'auto';
      if (['extract', 'explain', 'teach'].includes(saved.responseDepth)) state.responseDepth = saved.responseDepth;
      if (typeof saved.language === 'string') state.language = saved.language.slice(0, 80);
      if (saved.activeDrillByParent && typeof saved.activeDrillByParent === 'object') {
        state.activeDrillByParent = saved.activeDrillByParent;
      }
      state.pendingClick = null;
      state.drillMode = false;
      renderModeSelector();
      $('topicInput').placeholder = currentModeConfig().placeholder;
      renderCurrentPage();
      updateUI();
    }
  } catch (err) {
    console.warn('Failed to restore session:', err);
  } finally {
    clearStatus();
  }
}

function updateUI() {
  const { pages, currentIndex, loading } = state;
  const hasPages = pages.length > 0;
  const cur = pages[currentIndex];
  if (hasPages && cur?.pdfDocId && cur?.pdfPageNumber && cur?.pdfPageCount) {
    const taggedTag = cur.pdfTagged ? 'tagged' : 'untagged';
    $('pageCounter').textContent = `PDF · page ${cur.pdfPageNumber}/${cur.pdfPageCount} (${taggedTag}) · session ${currentIndex + 1}/${pages.length}`;
  } else {
    $('pageCounter').textContent = hasPages ? `${currentIndex + 1} / ${pages.length}` : '';
  }
  if ($('globalLanguageInput') && $('globalLanguageInput').value !== state.language) $('globalLanguageInput').value = state.language;
  $('backBtn').disabled = currentIndex <= 0 || loading;
  $('resetBtn').disabled = !hasPages || loading;
  $('drillBtn').disabled = !hasPages || loading || pages[currentIndex]?.type !== 'image';
  $('learnBtn').disabled = !hasPages || loading || pages[currentIndex]?.type !== 'image';
  $('entitiesBtn').disabled = !hasPages || loading || pages[currentIndex]?.type !== 'image';
  $('drillBtn').classList.toggle('active', state.drillMode);

  if (hasPages) {
    $('thumbnailStrip').classList.remove('hidden');
    $('thumbnailStrip').innerHTML = '';
    pages.forEach((page, i) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'thumb-index';
      let thumb;
      if (page.type === 'markdown' || page.type === 'chart' || page.type === 'table' || page.type === 'diagram') {
        thumb = document.createElement('div');
        thumb.className = `text-thumb${i === currentIndex ? ' active' : ''}`;
        thumb.textContent = ({ markdown: 'M', chart: 'C', table: 'T', diagram: 'D' })[page.type] || 'T';
        thumb.title = page.title || `${page.type} page`;
      } else {
        thumb = document.createElement('img');
        thumb.className = `thumb${i === currentIndex ? ' active' : ''}`;
        thumb.src = page.imageUrl;
        thumb.alt = `Page ${i + 1}`;
      }
      thumb.onclick = () => { if (!state.loading) { state.currentIndex = i; state.pendingClick = null; renderCurrentPage(); updateUI(); saveSession(); } };
      const label = document.createElement('span');
      label.textContent = i + 1;
      wrapper.appendChild(thumb);
      wrapper.appendChild(label);
      $('thumbnailStrip').appendChild(wrapper);
    });
    const active = $('thumbnailStrip').querySelector('.thumb.active, .text-thumb.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  } else {
    $('thumbnailStrip').classList.add('hidden');
  }
}

function stripSourceContextNoise(text) {
  return String(text || '').replace(/## Suggested Drill Targets[\s\S]*$/i, '').trim();
}

function sourceSection(text, names) {
  const body = stripSourceContextNoise(text);
  const wanted = names.map(name => name.toLowerCase());
  const matches = [...body.matchAll(/^##\s+(.+?)\s*$/gmi)];
  for (let i = 0; i < matches.length; i++) {
    const heading = matches[i][1].trim().toLowerCase();
    if (!wanted.includes(heading)) continue;
    const start = matches[i].index + matches[i][0].length;
    const end = i + 1 < matches.length ? matches[i + 1].index : body.length;
    return body.slice(start, end).trim();
  }
  return '';
}

function sourceContextSections(contextPage) {
  const content = contextPage?.content || '';
  const extracted = [
    sourceSection(content, ['Extracted Text', 'OCR / Transcription', 'Transcription']),
    sourceSection(content, ['Chart And Data Extraction', 'Chart and Data Extraction', 'Data Extraction']),
  ].filter(Boolean).join('\n\n');
  return {
    extracted: extracted || 'No extracted text was found for this image.',
    structure: sourceSection(content, ['Structure']) || 'No structure summary was found for this image.',
    concepts: sourceSection(content, ['Key Concepts']) || 'No key concepts were found for this image.',
  };
}

function sourcePanel(title, content, extraClass = '') {
  return `<section class="source-panel ${extraClass}">
    <h2>${escapeHtml(title)}</h2>
    <div class="source-content">${simpleMarkdown(content)}</div>
  </section>`;
}

function sourceAccordion(title, content) {
  return `<details class="source-accordion">
    <summary>${escapeHtml(title)}</summary>
    <div class="source-accordion-content">${simpleMarkdown(content)}</div>

}

function analysisPanel(pageId, title, key, content) {

       <div class="inline-analysis-actions">

    <h2>${escapeHtml(title)}</h2>

  </section>`;
}

function analysisAccordion(pageId, title, key, content) {
  const type = key === 'description' ? 'description' : 'explanation';
  const isLoading = Boolean(inlineAnalysisRequests[pageId]);
  const body = content
    ? simpleMarkdown(content)
    : `<p>${isLoading ? 'Analyzing...' : `No ${title.toLowerCase()} yet.`}</p>
       <div class="inline-analysis-actions">
         <button type="button" data-inline-analysis="${type}">Analyze ${escapeHtml(title)}</button>
         <button type="button" data-inline-analysis="both">Analyze Both</button>
       </div>`;
  return `<details class="source-accordion">
    <summary>${escapeHtml(title)}</summary>

  </details>`;

function loadInlineAnalysis(pageId) {
  if (!pageId || learnCache[pageId] || inlineAnalysisRequests[pageId]) return;
  inlineAnalysisRequests[pageId] = fetch(`/api/analysis/${pageId}`)
    .then(res => res.ok ? res.json() : { description: null, explanation: null })
    .then(data => { learnCache[pageId] = data; })
    .catch(() => { learnCache[pageId] = { description: null, explanation: null }; })
    .finally(() => {
      delete inlineAnalysisRequests[pageId];
      if (state.pages[state.currentIndex]?.id === pageId) {
        renderCurrentPage();
        updateUI();
      }
    });
}

function bindInlineAnalysisActions(root, pageId) {
  root.querySelectorAll('[data-inline-analysis]').forEach(button => {
    button.addEventListener('click', () => runInlineAnalysis(pageId, button.dataset.inlineAnalysis));
  });
}

async function runInlineAnalysis(pageId, type) {
  if (!pageId || inlineAnalysisRequests[pageId]) return;
  inlineAnalysisRequests[pageId] = Promise.resolve();
  renderCurrentPage();
  updateUI();
  try {
    const res = await fetch(`/api/analysis/${pageId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type }),
    });
    const data = await res.json();
    if (data.error && !data.description && !data.explanation) showError(data.error);
    learnCache[pageId] = data;
  } catch (err) {
    showError('Analysis failed: ' + err.message);
  } finally {
    delete inlineAnalysisRequests[pageId];
    renderCurrentPage();
    updateUI();
  }
}

function drillKey(click) {
  return `${Number(click.x).toFixed(2)}:${Number(click.y).toFixed(2)}`;
}

function drillGroupsForPage(parentId) {
  const groups = new Map();
  for (const page of state.pages) {
    if (page.parentId !== parentId || !page.parentClick) continue;
    const key = drillKey(page.parentClick);
    if (!groups.has(key)) {
      groups.set(key, {
        key,
        x: Number(page.parentClick.x),
        y: Number(page.parentClick.y),
        items: [],
      });
    }
    groups.get(key).items.push(page);
  }
  return [...groups.values()];
}

function activeDrillSelection(parentId, groups) {
  const saved = state.activeDrillByParent[parentId];
  if (!saved) return null;
  const group = groups.find(item => item.key === saved.key);
  if (!group?.items.length) return null;
  const index = clamp(Number(saved.index) || 0, 0, group.items.length - 1);
  return { group, index, page: group.items[index] };
}

function selectDrillGroup(parentId, groupKey) {
  const groups = drillGroupsForPage(parentId);
  const group = groups.find(item => item.key === groupKey);
  if (!group) return;
  const current = state.activeDrillByParent[parentId];
  const nextIndex = current?.key === groupKey ? ((Number(current.index) || 0) + 1) % group.items.length : 0;
  state.activeDrillByParent[parentId] = { key: groupKey, index: nextIndex };
  renderCurrentPage();
  updateUI();
}

function compactChartHtml(chart) {
  const notes = chart?.notes?.length ? `<ul>${chart.notes.map(note => `<li>${escapeHtml(note)}</li>`).join('')}</ul>` : '';
  const uncertainty = chart?.uncertainty ? `<p><strong>Uncertainty:</strong> ${escapeHtml(chart.uncertainty)}</p>` : '';
  return `${chartSvg(chart || {})}${notes}${uncertainty}`;
}

function drillResultPanel(selection) {
  if (!selection?.page) {
    return `<section class="source-panel drill-result">
      <h2>Drill-in Explanation</h2>
      <div class="empty-drill">Click a red drill-in circle on the image to show its explanation here. Re-click numbered circles to cycle through related drill-ins.</div>
    </section>`;
  }
  const page = selection.page;
  const kind = ({ markdown: 'Text', chart: 'Chart', table: 'Table', diagram: 'Diagram', image: 'Image' })[page.type] || page.type;
  const title = page.title || page.intent || `${kind} drill-in`;
  const meta = `${kind} ${selection.index + 1} of ${selection.group.items.length}`;
  let body = '';
  if (page.type === 'markdown') body = simpleMarkdown(page.content || '');
  else if (page.type === 'chart') body = compactChartHtml(page.chart || {});
  else if (page.type === 'table') body = tableHtml(page.table || {});
  else if (page.type === 'diagram') body = diagramSvg(page.diagram || {});
  else if (page.type === 'image') body = `<img src="${escapeHtml(page.imageUrl)}" alt="${escapeHtml(title)}">`;
  else body = '<p>No renderable drill-in content.</p>';

  return `<section class="source-panel drill-result">
    <h2>${escapeHtml(title)}</h2>
    <div class="drill-result-meta">${escapeHtml(meta)}</div>
    <div class="source-content">${body}</div>
  </section>`;
}

function loadSourceContext(pageId) {
  if (!pageId || sourceContextCache[pageId] !== undefined || sourceContextRequests[pageId]) return;
  sourceContextRequests[pageId] = fetch(`/api/context/${pageId}`)
    .then(res => res.ok ? res.json() : { page: null })
    .then(data => { sourceContextCache[pageId] = data.page || null; })
    .catch(() => { sourceContextCache[pageId] = null; })
    .finally(() => {
      delete sourceContextRequests[pageId];
      if (state.pages[state.currentIndex]?.id === pageId) {
        renderCurrentPage();
        updateUI();
      }
    });
}

function renderCurrentPage() {
  const page = state.pages[state.currentIndex];
  const canvas = $('canvasArea');
  if (!page) {
    canvas.className = 'canvas-area empty';
    canvas.innerHTML = 'Type a topic above — or upload your own image to start drilling into it';
    return;
  }
  // Lazy-load any persisted drill descendants so previously-created drill
  // targets are visible even after a session restore or gallery reload.
  if (page.type === 'image') ensureDescendantsLoaded(page.id);

  canvas.className = 'canvas-area';
  canvas.innerHTML = '';

  if (page.type === 'markdown') {
    const article = document.createElement('article');
    article.className = 'text-page';
    article.innerHTML = `
      <div class="text-page-header">
        <div class="text-page-title">${escapeHtml(page.title || 'Drill-down explanation')}</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          <div class="text-page-kind">Text response</div>
          ${rendererActions(page)}
        </div>
      </div>
      <div class="text-page-content">${simpleMarkdown(page.content || '')}</div>
      ${page.source ? `<div class="text-page-source">Generated via ${escapeHtml(page.source)}</div>` : ''}
    `;
    canvas.appendChild(article);
    bindRendererActions(page);
    renderMath(article);
    return;
  }

  if (page.type === 'chart') {
    const article = document.createElement('article');
    article.className = 'chart-page';
    const chart = page.chart || {};
    const chartability = chart.chartability || 'medium';
    const confidence = Number.isFinite(Number(chart.confidence)) ? `${Math.round(Number(chart.confidence) * 100)}% confidence` : 'confidence not rated';
    const reliabilityClass = chartability === 'low' ? 'bad' : (chart.requiresUserConfirmation || chart.validationIssues?.length ? 'warn' : '');
    const reliability = `
      <div class="chart-reliability">
        <span class="chart-pill ${reliabilityClass}">Chartability: ${escapeHtml(chartability)}</span>
        <span class="chart-pill ${reliabilityClass}">${escapeHtml(confidence)}</span>
        ${chart.requiresUserConfirmation ? '<span class="chart-pill warn">Review values before using</span>' : ''}
      </div>
    `;
    const fallback = chartability === 'low'
      ? `<div class="chart-fallback">A chart is not reliable for this selected region. Recommended fallback: ${escapeHtml(chart.fallbackRecommendation || 'text')}.</div>`
      : '';
    const notes = page.chart?.notes?.length
      ? `<ul class="chart-notes">${page.chart.notes.map(note => `<li>${escapeHtml(note)}</li>`).join('')}</ul>`
      : '';
    const evidenceItems = [
      ...(Array.isArray(chart.sourceEvidence) ? chart.sourceEvidence : []),
      ...(Array.isArray(chart.points) ? chart.points.filter(point => point.evidence).slice(0, 8).map(point => `${point.label}: ${point.evidence}`) : []),
    ].slice(0, 10);
    const evidence = evidenceItems.length
      ? `<ul class="chart-evidence">${evidenceItems.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`
      : '';
    const validation = chart.validationIssues?.length
      ? `<div class="chart-uncertainty">Validation notes: ${escapeHtml(chart.validationIssues.join(' '))}</div>`
      : '';
    const uncertainty = page.chart?.uncertainty
      ? `<div class="chart-uncertainty">${escapeHtml(page.chart.uncertainty)}</div>`
      : '';
    const shouldRenderChart = chartability !== 'low' && Array.isArray(chart.points) && chart.points.length >= 2;
    article.innerHTML = `
      <div class="text-page-header">
        <div class="text-page-title">${escapeHtml(page.title || page.chart?.title || 'Chart drill-down')}</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          <div class="text-page-kind">Chart response</div>
          ${rendererActions(page)}
        </div>
      </div>
      ${reliability}
      ${fallback}
      ${shouldRenderChart ? chartSvg(chart) : ''}
      ${notes}
      ${evidence}
      ${uncertainty}
      ${validation}
      ${page.source ? `<div class="text-page-source">Generated via ${escapeHtml(page.source)}</div>` : ''}
    `;
    canvas.appendChild(article);
    bindRendererActions(page);
    return;
  }

  if (page.type === 'table') {
    const article = document.createElement('article');
    article.className = 'chart-page';
    const notes = page.table?.notes?.length
      ? `<ul class="chart-notes">${page.table.notes.map(note => `<li>${escapeHtml(note)}</li>`).join('')}</ul>`
      : '';
    const uncertainty = page.table?.uncertainty
      ? `<div class="chart-uncertainty">${escapeHtml(page.table.uncertainty)}</div>`
      : '';
    article.innerHTML = `
      <div class="text-page-header">
        <div class="text-page-title">${escapeHtml(page.title || page.table?.title || 'Table drill-down')}</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          <div class="text-page-kind">Table response</div>
          ${rendererActions(page)}
        </div>
      </div>
      ${tableHtml(page.table || {})}
      ${notes}
      ${uncertainty}
      ${page.source ? `<div class="text-page-source">Generated via ${escapeHtml(page.source)}</div>` : ''}
    `;
    canvas.appendChild(article);
    bindRendererActions(page);
    renderMath(article);
    return;
  }

  if (page.type === 'diagram') {
    const article = document.createElement('article');
    article.className = 'chart-page diagram-page';
    const notes = page.diagram?.notes?.length
      ? `<ul class="diagram-notes">${page.diagram.notes.map(note => `<li>${escapeHtml(note)}</li>`).join('')}</ul>`
      : '';
    const uncertainty = page.diagram?.uncertainty
      ? `<div class="chart-uncertainty">${escapeHtml(page.diagram.uncertainty)}</div>`
      : '';
    article.innerHTML = `
      <div class="text-page-header">
        <div class="text-page-title">${escapeHtml(page.title || page.diagram?.title || 'Diagram drill-down')}</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          <div class="text-page-kind">Diagram response</div>
          ${rendererActions(page)}
        </div>
      </div>
      ${diagramSvg(page.diagram || {})}
      ${notes}
      ${uncertainty}
      ${page.source ? `<div class="text-page-source">Generated via ${escapeHtml(page.source)}</div>` : ''}
    `;
    canvas.appendChild(article);
    bindRendererActions(page);
    renderMath(article);
    return;
  }

  const container = document.createElement('div');
  container.className = `image-container${state.drillMode ? ' clickable' : ''}`;
  loadSourceContext(page.id);
  loadInlineAnalysis(page.id);
  const drillGroups = drillGroupsForPage(page.id);
  const activeDrill = activeDrillSelection(page.id, drillGroups);

  const img = document.createElement('img');
  img.src = page.imageUrl;
  img.alt = 'Illustrated page';
  img.draggable = false;

  img.onclick = (e) => {
    if (state.loading || !state.drillMode) return;
    const rect = img.getBoundingClientRect();
    const nx = (e.clientX - rect.left) / rect.width;
    const ny = (e.clientY - rect.top) / rect.height;
    // Set pending click — show marker and confirm bar
    state.pendingClick = { x: nx, y: ny };
    renderCurrentPage();
    updateUI();
  };

  container.appendChild(img);

  if (drillGroups.length) {
    // Browser-only navigation targets. Model calls use the original image file plus the selected coordinates on the server.
    const placeTarget = (target, group) => {
      const imgRect = img.getBoundingClientRect();
      const contRect = container.getBoundingClientRect();
      target.style.left = `${group.x * imgRect.width + (imgRect.left - contRect.left)}px`;
      target.style.top = `${group.y * imgRect.height + (imgRect.top - contRect.top)}px`;
    };

    for (const group of drillGroups) {
      const target = document.createElement('button');
      target.type = 'button';
      target.className = `drill-target${activeDrill?.group.key === group.key ? ' active' : ''}`;
      target.title = group.items.length > 1 ? `Open drill-ins (${group.items.length}); click again to cycle` : 'Open drill-in';
      target.innerHTML = group.items.length > 1 ? `<span class="drill-target-count">${group.items.length}</span>` : '';
      target.onclick = (event) => {
        event.stopPropagation();
        selectDrillGroup(page.id, group.key);
      };
      container.appendChild(target);
      if (img.complete) placeTarget(target, group);
      else img.addEventListener('load', () => placeTarget(target, group), { once: true });
      requestAnimationFrame(() => placeTarget(target, group));
    }
  }

  // Show the click marker if pending
  if (state.pendingClick && !state.loading) {
    const marker = document.createElement('div');
    marker.className = 'click-marker';
    // Wait for image to have dimensions
    const placeMarker = () => {
      const imgRect = img.getBoundingClientRect();
      const contRect = container.getBoundingClientRect();
      marker.style.left = `${state.pendingClick.x * imgRect.width + (imgRect.left - contRect.left)}px`;
      marker.style.top = `${state.pendingClick.y * imgRect.height + (imgRect.top - contRect.top)}px`;
    };
    marker.innerHTML = '<div class="ring"></div><div class="dot"></div>';
    container.appendChild(marker);
    if (img.complete) placeMarker(); else img.onload = placeMarker;
    requestAnimationFrame(placeMarker);

    // Confirm bar
    const bar = document.createElement('div');
    bar.className = 'confirm-bar';
    const intentInput = document.createElement('input');
    intentInput.className = 'confirm-intent';
    intentInput.type = 'text';
    intentInput.placeholder = 'Optional question or goal for this spot';
    intentInput.maxLength = 500;
    intentInput.value = state.pendingClick.intent || '';
    const depthSelect = document.createElement('select');
    depthSelect.className = 'confirm-select';
    depthSelect.innerHTML = `
      <option value="extract">Extract</option>
      <option value="explain">Explain Here</option>
      <option value="teach">Teach Concepts</option>
    `;
    depthSelect.value = state.responseDepth;
    depthSelect.onchange = () => { state.responseDepth = depthSelect.value; };
    const goBtn = document.createElement('button');
    goBtn.className = 'btn confirm-go';
    goBtn.textContent = 'Image';
    goBtn.onclick = () => {
      const { x, y } = state.pendingClick;
      const intent = intentInput.value.trim();
      state.pendingClick = null;
      state.drillMode = false;
      generateChildPage(page.id, x, y, 'image', intent);
    };
    const textBtn = document.createElement('button');
    textBtn.className = 'btn confirm-text';
    textBtn.textContent = 'Text';
    textBtn.onclick = () => {
      const { x, y } = state.pendingClick;
      const intent = intentInput.value.trim();
      state.pendingClick = null;
      state.drillMode = false;
      generateChildPage(page.id, x, y, 'markdown', intent);
    };
    const chartBtn = document.createElement('button');
    chartBtn.className = 'btn confirm-chart';
    chartBtn.textContent = 'Chart';
    chartBtn.onclick = () => {
      const { x, y } = state.pendingClick;
      const intent = intentInput.value.trim();
      state.pendingClick = null;
      state.drillMode = false;
      generateChildPage(page.id, x, y, 'chart', intent);
    };
    const tableBtn = document.createElement('button');
    tableBtn.className = 'btn confirm-text';
    tableBtn.textContent = 'Table';
    tableBtn.onclick = () => {
      const { x, y } = state.pendingClick;
      const intent = intentInput.value.trim();
      state.pendingClick = null;
      state.drillMode = false;
      generateChildPage(page.id, x, y, 'table', intent);
    };
    const diagramBtn = document.createElement('button');
    diagramBtn.className = 'btn confirm-chart';
    diagramBtn.textContent = 'Diagram';
    diagramBtn.onclick = () => {
      const { x, y } = state.pendingClick;
      const intent = intentInput.value.trim();
      state.pendingClick = null;
      state.drillMode = false;
      generateChildPage(page.id, x, y, 'diagram', intent);
    };
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.onclick = () => { state.pendingClick = null; renderCurrentPage(); };
    bar.appendChild(intentInput);
    bar.appendChild(depthSelect);
    bar.appendChild(goBtn);
    bar.appendChild(textBtn);
    bar.appendChild(chartBtn);
    bar.appendChild(tableBtn);
    bar.appendChild(diagramBtn);
    bar.appendChild(cancelBtn);
    container.appendChild(bar);
    requestAnimationFrame(() => intentInput.focus());
  }

  // Loading overlay
  if (state.loading) {
    const overlay = document.createElement('div');
    overlay.className = 'loading-overlay';
    overlay.innerHTML = '<div class="spinner"></div>Generating... (30–60 sec)';
    container.appendChild(overlay);
  }

  const sourceContext = sourceContextCache[page.id];
  if (sourceContext?.content) {
    const sections = sourceContextSections(sourceContext);
    const analysis = learnCache[page.id] || {};
    const layout = document.createElement('div');
    layout.className = 'source-layout';

    const left = document.createElement('div');
    left.className = 'source-side source-left source-accordions';
    left.innerHTML = [
      sourceAccordion('Extracted Text', sections.extracted),
      sourceAccordion('Structure', sections.structure),
      sourceAccordion('Key Concepts', sections.concepts),
      analysisAccordion(page.id, 'Description', 'description', analysis.description),
      analysisAccordion(page.id, 'Concepts', 'explanation', analysis.explanation),
    ].join('');

    const center = document.createElement('div');
    center.className = 'source-center';
    center.appendChild(container);

    const right = document.createElement('div');
    right.className = 'source-side source-right';
    right.innerHTML = drillResultPanel(activeDrill);

    layout.appendChild(left);
    layout.appendChild(center);
    layout.appendChild(right);
    canvas.appendChild(layout);
    bindInlineAnalysisActions(left, page.id);
    renderMath(layout);
  } else {
    canvas.appendChild(container);
  }
  // Re-apply entity highlights if the entities panel is open and we have entities for this page
}

async function generateFirstPage(query) {
  clearError();
  setLoading(true);
  $('canvasArea').className = 'canvas-area generating';
  $('canvasArea').innerHTML = `<div class="spinner-large"></div>Choosing the right explainer format... this takes 30–60 seconds`;

  try {
    const res = await fetch('/api/page', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, mode: state.mode }),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || `Error ${res.status}`); }
    const { page } = await res.json();
    state.pages = [page];
    state.currentIndex = 0;
    state.activeDrillByParent = {};
    saveSession();
    clearError();
  } catch (err) { showError(err.message); }
  finally { setLoading(false); }
}

async function generateChildPage(parentId, x, y, responseKind = 'image', intent = '') {
  clearError();
  setLoading(true);
  try {
    const res = await fetch('/api/page', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ parentId, parentClick: { x, y }, responseKind, intent, responseDepth: state.responseDepth, language: state.language }),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || `Error ${res.status}`); }
    const { page } = await res.json();
    state.pages.push(page);
    if (page.parentId && page.parentClick) {
      const key = drillKey(page.parentClick);
      const existingCount = state.pages.filter(item => item.parentId === page.parentId && item.parentClick && drillKey(item.parentClick) === key).length;
      state.activeDrillByParent[page.parentId] = { key, index: Math.max(0, existingCount - 1) };
    }
    state.currentIndex = state.pages.length - 1;
    saveSession();
    clearError();
  } catch (err) { showError(err.message); }
  finally { setLoading(false); }
}

async function loadPageIntoSession(pageId) {
  clearError();
  showStatus('Loading saved page...');
  try {
    const page = await fetchSavedPage(pageId);
    if (!page) throw new Error('Saved page not found');
    const existing = state.pages.findIndex(p => p.id === page.id);
    if (existing >= 0) {
      state.currentIndex = existing;
    } else {
      state.pages.push(page);
      state.currentIndex = state.pages.length - 1;
    }
    state.pendingClick = null;
    state.drillMode = false;
    renderCurrentPage();
    updateUI();
    saveSession();
    closePanel('gallery');
  } catch (err) {
    showError(err.message);
  } finally {
    clearStatus();
  }
}

async function loadPagesIntoSession(pageIds) {
  clearError();
  showStatus('Loading gallery folder...');
  try {
    for (const pageId of pageIds) {
      if (state.pages.some(p => p.id === pageId)) continue;
      const page = await fetchSavedPage(pageId);
      if (page) state.pages.push(page);
    }
    if (state.pages.length) {
      state.currentIndex = state.pages.length - 1;
      state.pendingClick = null;
      state.drillMode = false;
      renderCurrentPage();
      updateUI();
      saveSession();
      closePanel('gallery');
    }
  } catch (err) {
    showError(err.message);
  } finally {
    clearStatus();
  }
}

async function translateCurrentPage(language) {
  const page = state.pages[state.currentIndex];
  if (!page || !language) return;
  clearError();
  showStatus(`Translating to ${language}...`);
  try {
    const res = await fetch(`/api/translate/${page.id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ language }),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || `Error ${res.status}`); }
    const { page: translated } = await res.json();
    if (translated && !state.pages.some(p => p.id === translated.id)) state.pages.push(translated);
    state.currentIndex = state.pages.findIndex(p => p.id === translated.id);
    renderCurrentPage();
    updateUI();
    saveSession();
  } catch (err) {
    showError(err.message);
  } finally {
    clearStatus();
  }
}

async function generateUploadContext(pageId) {
  showStatus('Analyzing upload context...');
  try {
    const res = await fetch(`/api/context/${pageId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },

// --- Upload ---

async function uploadImage(file) {
  // Detect PDF and route to multi-page upload pipeline
  const isPdf = (file.type === 'application/pdf') || /\.pdf$/i.test(file.name);
  if (isPdf) return uploadPdf(file);

  const label = $('topicInput').value.trim() || file.name.replace(/\.\w+$/, '');
  clearError();
  setLoading(true);
  $('canvasArea').className = 'canvas-area generating';
  $('canvasArea').innerHTML = '<div class="spinner-large"></div>Processing upload...';

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const res = await fetch('/api/upload', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageData: base64, label, mode: state.mode }),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || `Error ${res.status}`); }
    const { page } = await res.json();
    state.pages = [page];
    state.currentIndex = 0;
    state.activeDrillByParent = {};
    saveSession();
    renderCurrentPage();
    updateUI();
    clearError();
    await generateUploadContext(page.id);
  } catch (err) { showError(err.message); }
  finally { setLoading(false); }
}

async function uploadPdf(file) {
  const label = $('topicInput').value.trim() || file.name.replace(/\.\w+$/, '');
  clearError();
  setLoading(true);
  $('canvasArea').className = 'canvas-area generating';
  $('canvasArea').innerHTML = `<div class="spinner-large"></div>Rendering PDF pages…`;

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const res = await fetch('/api/upload-pdf', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pdfData: base64, label, mode: state.mode }),
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.error || `Error ${res.status}`);
    }
    const data = await res.json();
    if (!Array.isArray(data.pages) || !data.pages.length) {
      throw new Error('PDF returned no pages');
    }
    state.pages = data.pages;
    state.currentIndex = 0;
    state.activeDrillByParent = {};
    saveSession();
    renderCurrentPage();
    updateUI();
    clearError();
    const taggedTag = data.pdfTagged ? 'tagged PDF' : 'untagged / image PDF';
    showStatus(`Loaded ${data.pages.length} page${data.pages.length === 1 ? '' : 's'} (${taggedTag}). Drill in on any page or open Entities for structured extraction.`);
    setTimeout(clearStatus, 6000);
  } catch (err) {
    showError('PDF upload failed: ' + err.message);
  } finally {
    setLoading(false);
  }
}

function formatBytes(b) { return b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(0) + ' KB' : (b/1048576).toFixed(1) + ' MB'; }

async function openGallery() {
  $('galleryOverlay').classList.add('visible'); $('galleryPanel').classList.add('visible');
  $('galleryBody').innerHTML = 'Loading...';
  try {
    const res = await fetch('/api/gallery');
    const data = await res.json();
    if (data.folders.length === 0) { $('galleryBody').innerHTML = '<p style="color:#999;font-style:italic">No images yet.</p>'; return; }
    let html = `<div class="gallery-base-path">${data.generatedDir}</div>`;
    for (const f of data.folders) {
      const modeConfig = state.modes.find(m => m.id === f.mode);
      const tag = modeConfig?.tagLabel || f.mode || 'illustration';
      const folderIds = [...(f.images || []), ...(f.texts || [])]
        .sort((a, b) => new Date(a.created) - new Date(b.created))
        .map(item => item.id);
      html += `<div class="gallery-folder"><div class="gallery-folder-header"><span class="gallery-folder-title">${escapeHtml(f.query)}</span><span class="gallery-folder-meta"><button class="gallery-open-folder" data-folder-ids="${escapeHtml(folderIds.join(','))}">Open Folder</button><span class="mode-tag">${escapeHtml(tag)}</span>${f.imageCount} images${f.textCount ? ` · ${f.textCount} text` : ''}<span>${formatBytes(f.totalSize)}</span></span></div>`;
      html += `<div class="gallery-folder-path">${f.path}</div><div class="gallery-images">`;
      for (const img of f.images) {
        html += `<div class="gallery-img-card" data-page-id="${img.id}"><img src="${img.url}" loading="lazy"><div class="gallery-img-meta"><span>${img.id.slice(0,8)}...</span><span>${formatBytes(img.size)}</span></div></div>`;
      }
      html += '</div>';
      if (f.texts?.length) {
        html += '<div class="gallery-texts">';
        for (const text of f.texts) {
          html += `<div class="gallery-text-card" data-page-id="${text.id}"><div class="gallery-text-title">${escapeHtml(text.title || 'Text drill-down')}</div><div class="gallery-text-meta"><span>${text.id.slice(0,8)}...</span><span>${formatBytes(text.size)}</span></div></div>`;
        }
        html += '</div>';
      }
      html += '</div>';
    }
    $('galleryBody').innerHTML = html;
    $('galleryBody').querySelectorAll('[data-page-id]').forEach(card => {
      card.addEventListener('click', () => loadPageIntoSession(card.dataset.pageId));
    });
    $('galleryBody').querySelectorAll('[data-folder-ids]').forEach(button => {
      button.addEventListener('click', (event) => {
        event.stopPropagation();
        loadPagesIntoSession(button.dataset.folderIds.split(',').filter(Boolean));
      });
    });
  } catch (err) { $('galleryBody').innerHTML = `<p style="color:#b91c1c">Error: ${err.message}</p>`; }
}

let learnCache = {}; // pageId -> { description, explanation }
let learnActiveTab = 'description';
let learnAnalyzing = false;

function simpleMarkdown(text) {
  if (!text) return '';
  return normalizeMathText(text)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^- \*\*(.+?)\*\*:\s?(.*)$/gm, '<li><strong>$1</strong>: $2</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/^(?!<[hlu])/gm, function(m) { return m; })
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/\n/g, '<br>');
}

async function openLearn() {
